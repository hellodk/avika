# Release workflow for Avika - Automated Semantic Versioning
# Parses conventional commits to determine version bumps:
#   feat:  → MINOR bump (1.0.0 → 1.1.0)
#   fix:   → PATCH bump (1.0.0 → 1.0.1)
#   feat!: or BREAKING CHANGE: → MAJOR bump (1.0.0 → 2.0.0)
#   chore/docs/refactor/test/ci/style: → NO RELEASE
name: Release

on:
  push:
    branches:
      - master
      - main
  workflow_dispatch:
    inputs:
      bump_type:
        description: 'Version bump type (overrides automatic detection)'
        required: true
        default: 'auto'
        type: choice
        options:
          - auto
          - patch
          - minor
          - major
      prerelease:
        description: 'Pre-release suffix (e.g., rc.1, beta.1, leave empty for stable)'
        required: false
        default: ''

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write
  packages: write
  pull-requests: write

env:
  GO_VERSION: '1.24'
  NODE_VERSION: '20'
  # Image registry: single source is .github/IMAGE_REGISTRY (set in build-push-images job)

jobs:
  # Analyze commits to determine if release is needed and what type
  analyze-commits:
    name: Analyze Commits
    runs-on: ubuntu-latest
    outputs:
      should_release: ${{ steps.analyze.outputs.should_release }}
      bump_type: ${{ steps.analyze.outputs.bump_type }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Analyze commits for version bump
        id: analyze
        run: |
          # Get the commit message (first line only for merge commits)
          COMMIT_MSG=$(git log -1 --pretty=%B | head -1)
          echo "Commit message: $COMMIT_MSG"
          
          # Skip if this is a version bump commit (prevents infinite loop)
          if [[ "$COMMIT_MSG" == "chore(release): Bump version to"* ]]; then
            echo "Skipping release - this is a version bump commit"
            echo "should_release=false" >> $GITHUB_OUTPUT
            echo "bump_type=none" >> $GITHUB_OUTPUT
            exit 0
          fi
          
          # Skip if this is a merge of our own release PR (Merge pull request #N from .../release/vX.Y.Z)
          if [[ "$COMMIT_MSG" =~ ^Merge\ pull\ request\ #[0-9]+\ from\ .*release/v ]]; then
            echo "Skipping release - this is the merge of an automated release PR"
            echo "should_release=false" >> $GITHUB_OUTPUT
            echo "bump_type=none" >> $GITHUB_OUTPUT
            exit 0
          fi
          
          # For manual trigger with explicit bump type
          if [ "${{ github.event_name }}" == "workflow_dispatch" ] && [ "${{ inputs.bump_type }}" != "auto" ]; then
            echo "Manual trigger with bump type: ${{ inputs.bump_type }}"
            echo "should_release=true" >> $GITHUB_OUTPUT
            echo "bump_type=${{ inputs.bump_type }}" >> $GITHUB_OUTPUT
            exit 0
          fi
          
          # Get all commits since last tag (or last 50 if no tag)
          LAST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "")
          if [ -n "$LAST_TAG" ]; then
            echo "Last tag: $LAST_TAG"
            COMMITS=$(git log --pretty=format:"%s" $LAST_TAG..HEAD)
          else
            echo "No previous tag found, analyzing last 50 commits"
            COMMITS=$(git log --pretty=format:"%s" -50)
          fi
          
          echo "Commits to analyze:"
          echo "$COMMITS"
          
          # Determine bump type from commit messages
          BUMP_TYPE="none"
          
          # Check for breaking changes (MAJOR)
          if echo "$COMMITS" | grep -qEi "^(feat|fix|refactor)(\(.*\))?!:|BREAKING CHANGE:"; then
            BUMP_TYPE="major"
            echo "Found breaking change - MAJOR bump"
          # Check for features (MINOR): conventional feat:, or Feat/... title, or merge commit
          elif echo "$COMMITS" | grep -qEi "^feat(\(.*\))?:|^[Ff]eat/|^[Ff]eat |^Merge pull request #"; then
            BUMP_TYPE="minor"
            echo "Found feature or merge - MINOR bump"
          # Check for fixes (PATCH)
          elif echo "$COMMITS" | grep -qEi "^fix(\(.*\))?:"; then
            BUMP_TYPE="patch"
            echo "Found fix - PATCH bump"
          # Check for perf improvements (PATCH)
          elif echo "$COMMITS" | grep -qE "^perf(\(.+\))?:"; then
            BUMP_TYPE="patch"
            echo "Found performance improvement - PATCH bump"
          else
            echo "No releasable commits found (only chore/docs/refactor/test/ci/style)"
            BUMP_TYPE="none"
          fi
          
          # Set outputs
          if [ "$BUMP_TYPE" == "none" ]; then
            echo "should_release=false" >> $GITHUB_OUTPUT
          else
            echo "should_release=true" >> $GITHUB_OUTPUT
          fi
          echo "bump_type=$BUMP_TYPE" >> $GITHUB_OUTPUT
          
          echo "Final decision: should_release=$([ "$BUMP_TYPE" != "none" ] && echo true || echo false), bump_type=$BUMP_TYPE"

  # Version bump via release branch + PR + merge so we comply with "changes via PR" without needing a bypass.
  version-bump:
    name: Bump Version
    runs-on: ubuntu-latest
    needs: analyze-commits
    if: needs.analyze-commits.outputs.should_release == 'true'
    outputs:
      version: ${{ steps.bump.outputs.version }}
      tag: ${{ steps.bump.outputs.tag }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.RELEASE_TOKEN || secrets.GITHUB_TOKEN }}

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Bump version
        id: bump
        env:
          GH_TOKEN: ${{ secrets.RELEASE_TOKEN || secrets.GITHUB_TOKEN }}
        run: |
          set -e
          DEFAULT_BRANCH="${{ github.event.repository.default_branch }}"
          echo "Default branch: $DEFAULT_BRANCH"
          
          # Read current version
          CURRENT_VERSION=$(cat VERSION | tr -d '[:space:]')
          echo "Current version: $CURRENT_VERSION"
          
          BASE_VERSION=$(echo "$CURRENT_VERSION" | cut -d'-' -f1)
          IFS='.' read -r MAJOR MINOR PATCH <<< "$BASE_VERSION"
          
          BUMP_TYPE="${{ needs.analyze-commits.outputs.bump_type }}"
          echo "Bump type: $BUMP_TYPE"
          
          case "$BUMP_TYPE" in
            major)
              MAJOR=$((MAJOR + 1))
              MINOR=0
              PATCH=0
              ;;
            minor)
              MINOR=$((MINOR + 1))
              PATCH=0
              ;;
            patch)
              PATCH=$((PATCH + 1))
              ;;
          esac
          
          NEW_VERSION="${MAJOR}.${MINOR}.${PATCH}"
          PRERELEASE="${{ inputs.prerelease }}"
          if [ -n "$PRERELEASE" ]; then
            NEW_VERSION="${NEW_VERSION}-${PRERELEASE}"
          fi
          echo "New version: $NEW_VERSION"
          
          echo "$NEW_VERSION" > VERSION
          git add VERSION
          git commit -m "chore(release): Bump version to ${NEW_VERSION}"
          git tag -a "v${NEW_VERSION}" -m "Release v${NEW_VERSION}"
          
          # Push release branch (not default branch, so branch protection usually allows it)
          RELEASE_BRANCH="release/v${NEW_VERSION}"
          git checkout -b "$RELEASE_BRANCH"
          git push -u origin "$RELEASE_BRANCH"
          
          # Create PR and merge (satisfies "changes must be made through a pull request")
          gh pr create --base "$DEFAULT_BRANCH" --head "$RELEASE_BRANCH" \
            --title "chore(release): Bump version to ${NEW_VERSION}" \
            --body "Automated version bump for release v${NEW_VERSION}."
          sleep 2
          PR_NUM=$(gh pr list --base "$DEFAULT_BRANCH" --head "$RELEASE_BRANCH" --state open --json number -q '.[0].number')
          if [ -z "$PR_NUM" ]; then
            echo "::error::Could not get PR number. Create and merge the version-bump PR manually, then push tag v${NEW_VERSION} and re-run this workflow."
            exit 1
          fi
          # Merge immediately (satisfies "changes via PR"). If rules require approval, add github-actions[bot] to bypass or merge the PR manually.
          if ! gh pr merge "$PR_NUM" --merge; then
            echo "::error::Could not merge PR #$PR_NUM. If branch rules require review, add github-actions[bot] to the ruleset bypass list, or merge the PR manually and push tag: git push origin v${NEW_VERSION}"
            exit 1
          fi
          
          # Push tag (tags are not subject to branch PR rules)
          git push origin "v${NEW_VERSION}"
          
          echo "version=${NEW_VERSION}" >> $GITHUB_OUTPUT
          echo "tag=v${NEW_VERSION}" >> $GITHUB_OUTPUT

  build-binaries:
    name: Build Binaries
    runs-on: ubuntu-latest
    needs: [analyze-commits, version-bump]
    if: needs.analyze-commits.outputs.should_release == 'true'
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
            suffix: linux-amd64
          - goos: linux
            goarch: arm64
            suffix: linux-arm64
          - goos: darwin
            goarch: amd64
            suffix: darwin-amd64
          - goos: darwin
            goarch: arm64
            suffix: darwin-arm64
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: v${{ needs.version-bump.outputs.version }}

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Build Gateway
        run: |
          cd cmd/gateway
          CGO_ENABLED=0 GOOS=${{ matrix.goos }} GOARCH=${{ matrix.goarch }} \
            go build -ldflags="-s -w -X main.Version=${{ needs.version-bump.outputs.version }}" \
            -o gateway-${{ matrix.suffix }} .

      - name: Build Agent
        run: |
          cd cmd/agent
          CGO_ENABLED=0 GOOS=${{ matrix.goos }} GOARCH=${{ matrix.goarch }} \
            go build -ldflags="-s -w -X main.Version=${{ needs.version-bump.outputs.version }}" \
            -o agent-${{ matrix.suffix }} .

      - name: Upload Gateway artifact
        uses: actions/upload-artifact@v4
        with:
          name: gateway-${{ matrix.suffix }}
          path: cmd/gateway/gateway-${{ matrix.suffix }}

      - name: Upload Agent artifact
        uses: actions/upload-artifact@v4
        with:
          name: agent-${{ matrix.suffix }}
          path: cmd/agent/agent-${{ matrix.suffix }}

  build-push-images:
    name: Build & Push Docker Images
    runs-on: ubuntu-latest
    needs: [analyze-commits, version-bump]
    if: needs.analyze-commits.outputs.should_release == 'true'
    strategy:
      matrix:
        image:
          - name: gateway
            dockerfile: cmd/gateway/Dockerfile
            context: .
          - name: frontend
            dockerfile: frontend/Dockerfile
            context: ./frontend
          - name: agent
            dockerfile: cmd/agent/Dockerfile
            context: .
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: v${{ needs.version-bump.outputs.version }}
          fetch-depth: 0
          submodules: recursive

      - name: Set image registry (single source .github/IMAGE_REGISTRY)
        run: echo "IMAGE_REGISTRY=$(cat .github/IMAGE_REGISTRY | tr -d '\n')" >> $GITHUB_ENV

      - name: Get build metadata
        id: meta
        run: |
          echo "build_date=$(date -u +'%Y-%m-%dT%H:%M:%SZ')" >> $GITHUB_OUTPUT
          echo "git_commit=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: docker-meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_REGISTRY }}/avika-${{ matrix.image.name }}
          tags: |
            type=semver,pattern={{version}},value=${{ needs.version-bump.outputs.version }}
            type=semver,pattern={{major}}.{{minor}},value=${{ needs.version-bump.outputs.version }}
            type=raw,value=latest,enable=${{ !contains(needs.version-bump.outputs.version, '-') }}
            type=sha,prefix=sha-

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: ${{ matrix.image.context }}
          file: ${{ matrix.image.dockerfile }}
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.docker-meta.outputs.tags }}
          labels: ${{ steps.docker-meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            VERSION=${{ needs.version-bump.outputs.version }}
            BUILD_DATE=${{ steps.meta.outputs.build_date }}
            GIT_COMMIT=${{ steps.meta.outputs.git_commit }}

  package-helm:
    name: Package Helm Chart
    runs-on: ubuntu-latest
    needs: [analyze-commits, version-bump]
    if: needs.analyze-commits.outputs.should_release == 'true'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: v${{ needs.version-bump.outputs.version }}

      - name: Install Helm
        uses: azure/setup-helm@v3
        with:
          version: v3.13.0

      - name: Update Chart version
        run: |
          cd deploy/helm/avika
          sed -i "s/^version:.*/version: ${{ needs.version-bump.outputs.version }}/" Chart.yaml
          sed -i "s/^appVersion:.*/appVersion: \"${{ needs.version-bump.outputs.version }}\"/" Chart.yaml

      - name: Package Helm chart
        run: |
          helm package deploy/helm/avika --destination ./helm-package

      - name: Upload Helm chart artifact
        uses: actions/upload-artifact@v4
        with:
          name: helm-chart
          path: ./helm-package/*.tgz

  create-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: [analyze-commits, version-bump, build-binaries, build-push-images, package-helm]
    if: needs.analyze-commits.outputs.should_release == 'true'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: v${{ needs.version-bump.outputs.version }}
          fetch-depth: 0

      - name: Set image registry (single source .github/IMAGE_REGISTRY)
        run: echo "IMAGE_REGISTRY=$(cat .github/IMAGE_REGISTRY | tr -d '\n')" >> $GITHUB_ENV

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: ./artifacts

      - name: Prepare release assets
        run: |
          mkdir -p release-assets
          find ./artifacts -name 'gateway-*' -type f -exec mv {} release-assets/ \;
          find ./artifacts -name 'agent-*' -type f -exec mv {} release-assets/ \;
          find ./artifacts -name '*.tgz' -type f -exec mv {} release-assets/ \;
          chmod +x release-assets/gateway-* release-assets/agent-* 2>/dev/null || true
          cd release-assets
          sha256sum * > checksums.txt
          cat checksums.txt

      - name: Generate release notes
        id: release_notes
        run: |
          IMAGE_REGISTRY=$(cat .github/IMAGE_REGISTRY | tr -d '\n')
          PREV_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")
          
          if [ -n "$PREV_TAG" ]; then
            COMMITS=$(git log --pretty=format:"- %s (%h)" $PREV_TAG..HEAD)
          else
            COMMITS=$(git log --pretty=format:"- %s (%h)" -20)
          fi
          
          # Categorize commits
          FEATURES=$(echo "$COMMITS" | grep -E "^- feat" || echo "")
          FIXES=$(echo "$COMMITS" | grep -E "^- fix" || echo "")
          OTHERS=$(echo "$COMMITS" | grep -vE "^- (feat|fix)" || echo "")
          
          cat << EOF > release-notes.md
          ## What's Changed
          
          $([ -n "$FEATURES" ] && echo "### Features" && echo "$FEATURES" && echo "")
          $([ -n "$FIXES" ] && echo "### Bug Fixes" && echo "$FIXES" && echo "")
          $([ -n "$OTHERS" ] && echo "### Other Changes" && echo "$OTHERS" && echo "")
          
          ## Docker Images (GHCR)
          
          \`\`\`bash
          docker pull ${IMAGE_REGISTRY}/avika-gateway:${{ needs.version-bump.outputs.version }}
          docker pull ${IMAGE_REGISTRY}/avika-frontend:${{ needs.version-bump.outputs.version }}
          docker pull ${IMAGE_REGISTRY}/avika-agent:${{ needs.version-bump.outputs.version }}
          \`\`\`
          
          ## Binaries
          
          | Platform | Gateway | Agent |
          |----------|---------|-------|
          | Linux amd64 | gateway-linux-amd64 | agent-linux-amd64 |
          | Linux arm64 | gateway-linux-arm64 | agent-linux-arm64 |
          | macOS amd64 | gateway-darwin-amd64 | agent-darwin-amd64 |
          | macOS arm64 | gateway-darwin-arm64 | agent-darwin-arm64 |
          
          ## Helm Chart
          
          \`\`\`bash
          helm install avika ./avika-${{ needs.version-bump.outputs.version }}.tgz
          \`\`\`
          EOF

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: v${{ needs.version-bump.outputs.version }}
          name: Avika v${{ needs.version-bump.outputs.version }}
          body_path: release-notes.md
          draft: false
          prerelease: ${{ contains(needs.version-bump.outputs.version, '-') }}
          files: |
            release-assets/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Release Summary
        run: |
          echo "## Release v${{ needs.version-bump.outputs.version }} published!" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Bump type:** ${{ needs.analyze-commits.outputs.bump_type }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Docker Images (GHCR)" >> $GITHUB_STEP_SUMMARY
          echo "- ${{ env.IMAGE_REGISTRY }}/avika-gateway:${{ needs.version-bump.outputs.version }}" >> $GITHUB_STEP_SUMMARY
          echo "- ${{ env.IMAGE_REGISTRY }}/avika-frontend:${{ needs.version-bump.outputs.version }}" >> $GITHUB_STEP_SUMMARY
          echo "- ${{ env.IMAGE_REGISTRY }}/avika-agent:${{ needs.version-bump.outputs.version }}" >> $GITHUB_STEP_SUMMARY
