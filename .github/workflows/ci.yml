# Single CI workflow: lint, test, build, and (only for PR/push to master,uat,develop) build+push Docker images.
name: CI

on:
  pull_request:
    branches: [master, main, develop, uat]
  push:
    # Skip push for default branch: same commit already validated via PR. Reduces 5→4 runs per merge.
    branches: [develop, intermediate, 'feat/*']

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  GO_VERSION: '1.24'
  NODE_VERSION: '20'
  # Image registry: single source is .github/IMAGE_REGISTRY (CI/Release set it in job steps)

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true
      - run: go install github.com/golangci/golangci-lint/cmd/golangci-lint@v1.64.8
      - run: |
          for dir in cmd/gateway cmd/agent internal/common; do
            echo "Linting $dir..."
            (cd "$dir" && golangci-lint run --timeout=5m ./...)
          done

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true
      - run: |
          set -e
          for dir in cmd/gateway cmd/agent internal/common; do
            echo "Testing $dir..."
            (cd "$dir" && go test -v -race -coverprofile=coverage.out ./...)
          done
        env:
          CGO_ENABLED: 1
      - uses: codecov/codecov-action@v4
        with:
          files: cmd/gateway/coverage.out,cmd/agent/coverage.out,internal/common/coverage.out
          fail_ci_if_error: false

  build-gateway:
    name: Build Gateway
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true
      - run: |
          cd cmd/gateway
          CGO_ENABLED=0 GOOS=linux GOARCH=amd64 go build -ldflags="-s -w" -o gateway-linux-amd64 .
      - uses: actions/upload-artifact@v4
        with:
          name: gateway-linux-amd64
          path: cmd/gateway/gateway-linux-amd64
          retention-days: 1

  build-agent:
    name: Build Agent
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true
      - run: |
          cd cmd/agent
          CGO_ENABLED=0 GOOS=linux GOARCH=amd64 go build -ldflags="-s -w" -o agent-linux-amd64 .
      - uses: actions/upload-artifact@v4
        with:
          name: agent-linux-amd64
          path: cmd/agent/agent-linux-amd64
          retention-days: 1

  build-frontend:
    name: Build Frontend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
        working-directory: frontend
      - run: npm run build
        working-directory: frontend
        env:
          NEXT_PUBLIC_BASE_PATH: /avika

  # Build and push Docker images only for this workflow (triggered only on PR or push to master/main/develop/uat).
  docker-build-push:
    name: Docker Build & Push
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set image registry (single source .github/IMAGE_REGISTRY)
        run: echo "IMAGE_REGISTRY=$(cat .github/IMAGE_REGISTRY | tr -d '\n')" >> $GITHUB_ENV

      - name: Set image tags
        id: meta
        run: |
          VERSION=$(cat VERSION 2>/dev/null | tr -d '[:space:]' || echo "0.0.0-dev")
          SHA=$(git rev-parse --short HEAD)
          BUILD_DATE=$(date -u +'%Y-%m-%dT%H:%M:%SZ')
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "sha=$SHA" >> $GITHUB_OUTPUT
          echo "build_date=$BUILD_DATE" >> $GITHUB_OUTPUT
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            echo "image_tag=pr-${{ github.event.pull_request.number }}" >> $GITHUB_OUTPUT
          else
            BRANCH="${{ github.ref_name }}"
            if [ "$BRANCH" = "master" ] || [ "$BRANCH" = "main" ]; then
              echo "image_tag=latest" >> $GITHUB_OUTPUT
            else
              echo "image_tag=$(echo $BRANCH | tr '/' '-')" >> $GITHUB_OUTPUT
            fi
          fi
          echo "Using image_tag=${{ steps.meta.outputs.image_tag }} sha=$SHA"

      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3
      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Gateway
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./cmd/gateway/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ${{ env.IMAGE_REGISTRY }}/avika-gateway:${{ steps.meta.outputs.image_tag }}
            ${{ env.IMAGE_REGISTRY }}/avika-gateway:sha-${{ steps.meta.outputs.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            VERSION=${{ steps.meta.outputs.version }}
            BUILD_DATE=${{ steps.meta.outputs.build_date }}
            GIT_COMMIT=${{ steps.meta.outputs.sha }}

      - name: Build and push Frontend
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ${{ env.IMAGE_REGISTRY }}/avika-frontend:${{ steps.meta.outputs.image_tag }}
            ${{ env.IMAGE_REGISTRY }}/avika-frontend:sha-${{ steps.meta.outputs.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            VERSION=${{ steps.meta.outputs.version }}

      - name: Build and push Agent
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./cmd/agent/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ${{ env.IMAGE_REGISTRY }}/avika-agent:${{ steps.meta.outputs.image_tag }}
            ${{ env.IMAGE_REGISTRY }}/avika-agent:sha-${{ steps.meta.outputs.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            VERSION=${{ steps.meta.outputs.version }}
            BUILD_DATE=${{ steps.meta.outputs.build_date }}
            GIT_COMMIT=${{ steps.meta.outputs.sha }}

      - name: Summary
        run: |
          echo "## Docker images pushed (GHCR)" >> $GITHUB_STEP_SUMMARY
          echo "Tags: \`${{ steps.meta.outputs.image_tag }}\`, \`sha-${{ steps.meta.outputs.sha }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- ${{ env.IMAGE_REGISTRY }}/avika-gateway" >> $GITHUB_STEP_SUMMARY
          echo "- ${{ env.IMAGE_REGISTRY }}/avika-frontend" >> $GITHUB_STEP_SUMMARY
          echo "- ${{ env.IMAGE_REGISTRY }}/avika-agent" >> $GITHUB_STEP_SUMMARY
