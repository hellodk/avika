# Build and push Docker images on every push to master/main.
# Two parallel jobs (amd64 + arm64) push arch-specific tags; a merge job
# creates multi-arch manifests for latest and sha-xxx. No QEMU; each arch
# is built natively. (Pushing the same tag from two jobs would overwrite
# and leave only the last push's arch on Docker Hub.)
name: Build on Merge

on:
  push:
    branches:
      - master
      - main
      - develop
      - intermediate

env:
  GO_VERSION: '1.23'
  NODE_VERSION: '20'
  DOCKERHUB_USERNAME: hellodk

jobs:
  build-amd64:
    name: Build & Push (amd64)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get version and SHA
        id: meta
        run: |
          if [ -f VERSION ]; then
            VERSION=$(cat VERSION | tr -d '[:space:]')
          else
            VERSION="0.0.0-dev"
          fi
          SHA=$(git rev-parse --short HEAD)
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "sha=$SHA" >> $GITHUB_OUTPUT
          echo "Using version=$VERSION sha=$SHA"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ env.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push Gateway (amd64)
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./cmd/gateway/Dockerfile
          platforms: linux/amd64
          push: true
          tags: |
            ${{ env.DOCKERHUB_USERNAME }}/avika-gateway:latest-amd64
            ${{ env.DOCKERHUB_USERNAME }}/avika-gateway:sha-${{ steps.meta.outputs.sha }}-amd64
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            VERSION=${{ steps.meta.outputs.version }}

      - name: Build and push Frontend (amd64)
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          platforms: linux/amd64
          push: true
          tags: |
            ${{ env.DOCKERHUB_USERNAME }}/avika-frontend:latest-amd64
            ${{ env.DOCKERHUB_USERNAME }}/avika-frontend:sha-${{ steps.meta.outputs.sha }}-amd64
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            VERSION=${{ steps.meta.outputs.version }}

      - name: Build and push Agent (amd64)
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./cmd/agent/Dockerfile
          platforms: linux/amd64
          push: true
          tags: |
            ${{ env.DOCKERHUB_USERNAME }}/avika-agent:latest-amd64
            ${{ env.DOCKERHUB_USERNAME }}/avika-agent:sha-${{ steps.meta.outputs.sha }}-amd64
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            VERSION=${{ steps.meta.outputs.version }}

      - name: Summary
        run: |
          echo "## Build on Merge (amd64)" >> $GITHUB_STEP_SUMMARY
          echo "Pushed \`latest-amd64\` and \`sha-${{ steps.meta.outputs.sha }}-amd64\`" >> $GITHUB_STEP_SUMMARY
          echo "- hellodk/avika-gateway" >> $GITHUB_STEP_SUMMARY
          echo "- hellodk/avika-frontend" >> $GITHUB_STEP_SUMMARY
          echo "- hellodk/avika-agent" >> $GITHUB_STEP_SUMMARY

  build-arm64:
    name: Build & Push (arm64)
    runs-on: ubuntu-24.04-arm
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get version and SHA
        id: meta
        run: |
          if [ -f VERSION ]; then
            VERSION=$(cat VERSION | tr -d '[:space:]')
          else
            VERSION="0.0.0-dev"
          fi
          SHA=$(git rev-parse --short HEAD)
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "sha=$SHA" >> $GITHUB_OUTPUT
          echo "Using version=$VERSION sha=$SHA"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ env.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push Gateway (arm64)
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./cmd/gateway/Dockerfile
          platforms: linux/arm64
          push: true
          tags: |
            ${{ env.DOCKERHUB_USERNAME }}/avika-gateway:latest-arm64
            ${{ env.DOCKERHUB_USERNAME }}/avika-gateway:sha-${{ steps.meta.outputs.sha }}-arm64
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            VERSION=${{ steps.meta.outputs.version }}

      - name: Build and push Frontend (arm64)
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          platforms: linux/arm64
          push: true
          tags: |
            ${{ env.DOCKERHUB_USERNAME }}/avika-frontend:latest-arm64
            ${{ env.DOCKERHUB_USERNAME }}/avika-frontend:sha-${{ steps.meta.outputs.sha }}-arm64
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            VERSION=${{ steps.meta.outputs.version }}

      - name: Build and push Agent (arm64)
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./cmd/agent/Dockerfile
          platforms: linux/arm64
          push: true
          tags: |
            ${{ env.DOCKERHUB_USERNAME }}/avika-agent:latest-arm64
            ${{ env.DOCKERHUB_USERNAME }}/avika-agent:sha-${{ steps.meta.outputs.sha }}-arm64
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            VERSION=${{ steps.meta.outputs.version }}

      - name: Summary
        run: |
          echo "## Build on Merge (arm64)" >> $GITHUB_STEP_SUMMARY
          echo "Pushed \`latest-arm64\` and \`sha-${{ steps.meta.outputs.sha }}-arm64\`" >> $GITHUB_STEP_SUMMARY
          echo "- hellodk/avika-gateway" >> $GITHUB_STEP_SUMMARY
          echo "- hellodk/avika-frontend" >> $GITHUB_STEP_SUMMARY
          echo "- hellodk/avika-agent" >> $GITHUB_STEP_SUMMARY

  merge-manifest:
    name: Merge multi-arch manifests
    runs-on: ubuntu-latest
    needs: [build-amd64, build-arm64]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get SHA
        id: meta
        run: |
          SHA=$(git rev-parse --short HEAD)
          echo "sha=$SHA" >> $GITHUB_OUTPUT

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ env.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Create and push multi-arch manifests
        run: |
          REPO="${{ env.DOCKERHUB_USERNAME }}"
          SHA="${{ steps.meta.outputs.sha }}"
          for IMG in avika-gateway avika-frontend avika-agent; do
            echo "Creating multi-arch manifest for ${REPO}/${IMG}:latest"
            docker buildx imagetools create -t "${REPO}/${IMG}:latest" \
              "${REPO}/${IMG}:latest-amd64" \
              "${REPO}/${IMG}:latest-arm64"
            echo "Creating multi-arch manifest for ${REPO}/${IMG}:sha-${SHA}"
            docker buildx imagetools create -t "${REPO}/${IMG}:sha-${SHA}" \
              "${REPO}/${IMG}:sha-${SHA}-amd64" \
              "${REPO}/${IMG}:sha-${SHA}-arm64"
          done

      - name: Summary
        run: |
          echo "## Multi-arch manifests" >> $GITHUB_STEP_SUMMARY
          echo "Pushed \`latest\` and \`sha-${{ steps.meta.outputs.sha }}\` (amd64 + arm64) for:" >> $GITHUB_STEP_SUMMARY
          echo "- hellodk/avika-gateway" >> $GITHUB_STEP_SUMMARY
          echo "- hellodk/avika-frontend" >> $GITHUB_STEP_SUMMARY
          echo "- hellodk/avika-agent" >> $GITHUB_STEP_SUMMARY
