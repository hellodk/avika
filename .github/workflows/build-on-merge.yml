# Build and push Docker images on every push to master/main.
# Two parallel jobs (amd64 + arm64) push the same tags so Docker Hub
# creates multi-arch manifests. No QEMU; each arch is built natively.
name: Build on Merge

on:
  push:
    branches:
      - master
      - main

env:
  GO_VERSION: '1.23'
  NODE_VERSION: '20'
  DOCKERHUB_USERNAME: hellodk

jobs:
  build-amd64:
    name: Build & Push (amd64)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get version and SHA
        id: meta
        run: |
          if [ -f VERSION ]; then
            VERSION=$(cat VERSION | tr -d '[:space:]')
          else
            VERSION="0.0.0-dev"
          fi
          SHA=$(git rev-parse --short HEAD)
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "sha=$SHA" >> $GITHUB_OUTPUT
          echo "Using version=$VERSION sha=$SHA"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ env.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push Gateway (amd64)
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./cmd/gateway/Dockerfile
          platforms: linux/amd64
          push: true
          tags: |
            ${{ env.DOCKERHUB_USERNAME }}/avika-gateway:latest
            ${{ env.DOCKERHUB_USERNAME }}/avika-gateway:sha-${{ steps.meta.outputs.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            VERSION=${{ steps.meta.outputs.version }}

      - name: Build and push Frontend (amd64)
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          platforms: linux/amd64
          push: true
          tags: |
            ${{ env.DOCKERHUB_USERNAME }}/avika-frontend:latest
            ${{ env.DOCKERHUB_USERNAME }}/avika-frontend:sha-${{ steps.meta.outputs.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            VERSION=${{ steps.meta.outputs.version }}

      - name: Build and push Agent (amd64)
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./cmd/agent/Dockerfile
          platforms: linux/amd64
          push: true
          tags: |
            ${{ env.DOCKERHUB_USERNAME }}/avika-agent:latest
            ${{ env.DOCKERHUB_USERNAME }}/avika-agent:sha-${{ steps.meta.outputs.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            VERSION=${{ steps.meta.outputs.version }}

      - name: Summary
        run: |
          echo "## Build on Merge (amd64)" >> $GITHUB_STEP_SUMMARY
          echo "Pushed \`latest\` and \`sha-${{ steps.meta.outputs.sha }}\` for linux/amd64" >> $GITHUB_STEP_SUMMARY
          echo "- hellodk/avika-gateway" >> $GITHUB_STEP_SUMMARY
          echo "- hellodk/avika-frontend" >> $GITHUB_STEP_SUMMARY
          echo "- hellodk/avika-agent" >> $GITHUB_STEP_SUMMARY

  build-arm64:
    name: Build & Push (arm64)
    runs-on: ubuntu-24.04-arm
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get version and SHA
        id: meta
        run: |
          if [ -f VERSION ]; then
            VERSION=$(cat VERSION | tr -d '[:space:]')
          else
            VERSION="0.0.0-dev"
          fi
          SHA=$(git rev-parse --short HEAD)
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "sha=$SHA" >> $GITHUB_OUTPUT
          echo "Using version=$VERSION sha=$SHA"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ env.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push Gateway (arm64)
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./cmd/gateway/Dockerfile
          platforms: linux/arm64
          push: true
          tags: |
            ${{ env.DOCKERHUB_USERNAME }}/avika-gateway:latest
            ${{ env.DOCKERHUB_USERNAME }}/avika-gateway:sha-${{ steps.meta.outputs.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            VERSION=${{ steps.meta.outputs.version }}

      - name: Build and push Frontend (arm64)
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          platforms: linux/arm64
          push: true
          tags: |
            ${{ env.DOCKERHUB_USERNAME }}/avika-frontend:latest
            ${{ env.DOCKERHUB_USERNAME }}/avika-frontend:sha-${{ steps.meta.outputs.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            VERSION=${{ steps.meta.outputs.version }}

      - name: Build and push Agent (arm64)
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./cmd/agent/Dockerfile
          platforms: linux/arm64
          push: true
          tags: |
            ${{ env.DOCKERHUB_USERNAME }}/avika-agent:latest
            ${{ env.DOCKERHUB_USERNAME }}/avika-agent:sha-${{ steps.meta.outputs.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            VERSION=${{ steps.meta.outputs.version }}

      - name: Summary
        run: |
          echo "## Build on Merge (arm64)" >> $GITHUB_STEP_SUMMARY
          echo "Pushed \`latest\` and \`sha-${{ steps.meta.outputs.sha }}\` for linux/arm64" >> $GITHUB_STEP_SUMMARY
          echo "- hellodk/avika-gateway" >> $GITHUB_STEP_SUMMARY
          echo "- hellodk/avika-frontend" >> $GITHUB_STEP_SUMMARY
          echo "- hellodk/avika-agent" >> $GITHUB_STEP_SUMMARY
