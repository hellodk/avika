syntax = "proto3";

package nginx.agent.v1;

option go_package = "github.com/avika-ai/avika/internal/common/proto/agent";

// Separate service for agent self-configuration.
// This service focuses on configuring the agent process itself (not NGINX config).
service AgentConfigService {
  rpc GetAgentConfig(google.protobuf.Empty) returns (GetAgentConfigResponse);
  rpc UpdateAgentConfig(AgentConfigUpdate) returns (AgentConfigUpdateResponse);
  rpc TestConnection(ConnectionTestRequest) returns (ConnectionTestResponse);
  rpc ListConfigBackups(google.protobuf.Empty) returns (ListConfigBackupsResponse);
  rpc RestoreConfigBackup(RestoreConfigBackupRequest) returns (AgentConfigUpdateResponse);
}

import "google/protobuf/empty.proto";

message GetAgentConfigResponse {
  string gateway_address = 1;
  string agent_id = 2;
  map<string, string> labels = 3;
  int32 health_port = 4;
  int32 mgmt_port = 5;
  string nginx_config_path = 6;
  string nginx_status_url = 7;
  string access_log_path = 8;
  string error_log_path = 9;
  string log_format = 10;
  string buffer_dir = 11;
  string update_server = 12;
  string update_interval = 13;
  string log_level = 14;
  string log_file = 15;
  string config_file_path = 16; // Path to avika-agent.conf
  string mgmt_advertise = 17;   // AVIKA_MGMT_ADVERTISE: IP or host:port for gateway dial-back
  string mgmt_nat_cidr = 18;    // AVIKA_MGMT_NAT_CIDR: CIDR to avoid when choosing mgmt IP (e.g. 10.0.2.0/24)
  LogRotateConfig log_rotation = 19;
  SyslogConfig syslog = 20;
}

message LogRotateConfig {
  bool enabled = 1;
  string schedule = 2;       // "daily", "weekly", "size-based"
  string max_size = 3;       // e.g., "100M"
  int32 retain_count = 4;    // Number of archived logs to keep
  bool compress = 5;         // gzip archived logs
}

message SyslogConfig {
  bool enabled = 1;
  string target_address = 2; // e.g., "udp://10.0.0.1:514"
  string facility = 3;       // "local7"
  string severity = 4;       // "info"
}

message AgentConfigUpdate {
  map<string, string> updates = 1; // key=value updates (config keys and LABEL_* supported)
  bool persist = 2;                // Write to config file
  bool hot_reload = 3;             // Apply without restart where possible
}

message AgentConfigUpdateResponse {
  bool success = 1;
  string error = 2;
  string message = 3;
  bool requires_restart = 4;
}

message ConnectionTestRequest {
  // Supported types: "gateway", "nginx_status", "update_server"
  string test_type = 1;
  // Optional override endpoint URL/address to test.
  string endpoint = 2;
}

message ConnectionTestResponse {
  bool success = 1;
  string message = 2;
  int64 latency_ms = 3;
  map<string, string> details = 4;
}

message ListConfigBackupsResponse {
  repeated ConfigBackupEntry backups = 1;
}

message ConfigBackupEntry {
  string name = 1;       // filename (e.g. avika-agent.conf.20060102T150405Z.bak)
  int64 created_at = 2; // unix timestamp
}

message RestoreConfigBackupRequest {
  string backup_name = 1; // filename from ListConfigBackups
}

