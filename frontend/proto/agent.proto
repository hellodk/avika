syntax = "proto3";

package nginx.agent.v1;

option go_package = "github.com/avika-ai/avika/internal/common/proto/agent";

service Commander {
  // Bi-directional stream:
  // - Agent sends Heartbeats, CommandAck, StateChanges
  // - Server sends ConfigPush, RestartCmd, SamplingPolicy
  rpc Connect(stream AgentMessage) returns (stream ServerCommand);
}

message AgentMessage {
  string agent_id = 1;
  int64 timestamp = 2;
  oneof payload {
    Heartbeat heartbeat = 3;
    CommandResult command_result = 4;
    StateSnapshot state = 5;
    LogEntry log_entry = 6;
    NginxMetrics metrics = 7;
  }
}

message SystemMetrics {
  float cpu_usage_percent = 1;
  float memory_usage_percent = 2;
  uint64 memory_total_bytes = 3;
  uint64 memory_used_bytes = 4;
  uint64 network_rx_bytes = 5;
  uint64 network_tx_bytes = 6;
  float network_rx_rate = 7;  // bytes/sec
  float network_tx_rate = 8;  // bytes/sec
  float cpu_user_percent = 9;
  float cpu_system_percent = 10;
  float cpu_iowait_percent = 11;
  map<string, string> labels = 12;
}

message HttpStatusMetrics {
  int64 status_2xx_count = 1;
  int64 status_200_count = 2;
  int64 status_3xx_count = 3;
  int64 status_4xx_count = 4;
  int64 status_404_count = 5;
  int64 status_5xx_count = 6;
  int64 status_503_count = 7;
}

message NginxMetrics {
  int64 active_connections = 1;
  int64 accepted_connections = 2;
  int64 handled_connections = 3;
  int64 total_requests = 4;
  int64 reading = 5;
  int64 writing = 6;
  int64 waiting = 7;
  double requests_per_second = 8;
  SystemMetrics system = 9;
  HttpStatusMetrics http_status = 10;
  
  // High-performance observability extensions
  map<string, string> labels = 11; // prometheus-style labels: server, upstream, route, etc.
  repeated HistogramBucket latency_distribution = 12;
}

message HistogramBucket {
  float le = 1; // less than or equal to (ms)
  int64 count = 2;
}

message ServerCommand {
  string command_id = 1;
  oneof payload {
    ConfigPush config_push = 2;
    Action action = 3;
    LogRequest log_request = 4;
    Update update = 5;
  }
}

message Update {
    string version = 1;      // version to update to, or "latest"
    string update_url = 2;    // optional: override the agent's configured update server URL
}

message Heartbeat {
  string hostname = 1;
  string version = 2;  // NGINX version
  double uptime = 3;
  repeated NginxInstance instances = 4;
  bool is_pod = 5;
  string pod_ip = 6;
  string agent_version = 7;   // Agent version
  string build_date = 8;       // Build timestamp
  string git_commit = 9;       // Git commit hash
  string git_branch = 10;      // Git branch name
  map<string, string> labels = 11;  // Agent labels for auto-assignment (project, environment, etc.)
}

message NginxInstance {
  string pid = 1;
  string version = 2;
  string conf_path = 3;
  string status = 4; // "RUNNING", "STOPPED"
}

message CommandResult {
  string command_id = 1;
  bool success = 2;
  string error_message = 3;
}

message StateSnapshot {
    string config_hash = 1;
    ConfigHashes config_hashes = 2; // Detailed config hashes for drift detection
}

// ============ Config Hashes for Drift Detection ============

message ConfigHashes {
    string main_conf_hash = 1;
    int64 main_conf_modified = 2;
    repeated FileHash site_configs = 3;
    repeated FileHash include_files = 4;
    repeated CertHashInfo certificates = 5;
    string maintenance_page_hash = 6;
    int64 computed_at = 7;
}

message FileHash {
    string path = 1;
    string hash = 2;
    int64 size = 3;
    int64 modified_at = 4;
}

message CertHashInfo {
    string domain = 1;
    string cert_path = 2;
    string cert_hash = 3;
    int64 expiry_timestamp = 4;
    string issuer = 5;
}

message ConfigPush {
  string version_id = 1;
  map<string, bytes> files = 2; // filename -> content
}

message Action {
    string type = 1; // "RELOAD", "RESTART"
}

message ConfigAugment {
  string augment_id = 1;
  string name = 2;
  string snippet = 3; // NGINX config snippet
  string context = 4; // "http", "server", "location"
}

// ============ Management Service ============

service AgentService {
  // Configuration Management
  rpc GetConfig(ConfigRequest) returns (ConfigResponse);
  rpc UpdateConfig(ConfigUpdate) returns (ConfigUpdateResponse);
  rpc ValidateConfig(ConfigValidation) returns (ValidationResult);
  rpc ReloadNginx(ReloadRequest) returns (ReloadResponse);
  rpc RestartNginx(RestartRequest) returns (RestartResponse);
  rpc StopNginx(StopRequest) returns (StopResponse);
  
  // Certificate Management
  rpc ListCertificates(CertListRequest) returns (CertListResponse);
  
  // Log Management
  rpc GetLogs(LogRequest) returns (stream LogEntry);

  // List currently connected agents
  rpc ListAgents(ListAgentsRequest) returns (ListAgentsResponse);

  // Get a single agent's info
  rpc GetAgent(GetAgentRequest) returns (AgentInfo);

  // Remove an agent from inventory
  rpc RemoveAgent(RemoveAgentRequest) returns (RemoveAgentResponse);

  // Uptime & Monitoring
  rpc GetUptimeReports(UptimeRequest) returns (UptimeResponse);


  // Analytics
  rpc GetAnalytics(AnalyticsRequest) returns (AnalyticsResponse);
  
  // Stream Analytics for real-time dashboards
  rpc StreamAnalytics(AnalyticsRequest) returns (stream AnalyticsResponse);

  // Tracing
  rpc GetTraces(TraceRequest) returns (TraceList);
  rpc GetTraceDetails(TraceRequest) returns (Trace);

  // AI Tuner
  rpc GetRecommendations(RecommendationRequest) returns (RecommendationResponse);
  
  // Config Augments (Provisions)
  rpc ApplyAugment(ApplyAugmentRequest) returns (ApplyAugmentResponse);

  // Agent Management
  rpc UpdateAgent(UpdateAgentRequest) returns (UpdateAgentResponse);

  // Command Execution (Shell)
  rpc Execute(stream ExecRequest) returns (stream ExecResponse);

  // Agent Configuration
  rpc GetAgentConfig(GetAgentConfigRequest) returns (AgentConfig);
  rpc UpdateAgentConfig(AgentConfig) returns (AgentConfigResponse);

  // Reporting
  rpc GenerateReport(ReportRequest) returns (ReportResponse);
  rpc SendReport(SendReportRequest) returns (SendReportResponse);
  rpc DownloadReport(ReportRequest) returns (ReportDownloadResponse);

  // Alerting
  rpc ListAlertRules(ListAlertRulesRequest) returns (AlertRuleList);
  rpc CreateAlertRule(AlertRule) returns (AlertRule);
  rpc DeleteAlertRule(DeleteAlertRuleRequest) returns (DeleteAlertRuleResponse);

  // ============ Agent Groups ============
  rpc ListGroups(ListGroupsRequest) returns (ListGroupsResponse);
  rpc GetGroup(GetGroupRequest) returns (AgentGroup);
  rpc CreateGroup(CreateGroupRequest) returns (AgentGroup);
  rpc UpdateGroup(UpdateGroupRequest) returns (AgentGroup);
  rpc DeleteGroup(DeleteGroupRequest) returns (DeleteGroupResponse);
  rpc AddAgentsToGroup(AddAgentsToGroupRequest) returns (AddAgentsToGroupResponse);
  rpc RemoveAgentFromGroup(RemoveAgentFromGroupRequest) returns (RemoveAgentFromGroupResponse);
  rpc SetGoldenAgent(SetGoldenAgentRequest) returns (SetGoldenAgentResponse);
  rpc GetGroupAgents(GetGroupAgentsRequest) returns (GetGroupAgentsResponse);

  // ============ Drift Detection ============
  rpc CheckDrift(DriftCheckRequest) returns (DriftCheckResponse);
  rpc GetDriftReport(GetDriftReportRequest) returns (DriftCheckResponse);
  rpc ListDriftReports(ListDriftReportsRequest) returns (ListDriftReportsResponse);
  rpc ResolveDrift(ResolveDriftRequest) returns (BatchConfigUpdateResponse);

  // ============ Batch Configuration ============
  rpc BatchUpdateConfig(BatchConfigUpdateRequest) returns (BatchConfigUpdateResponse);
  rpc GetBatchStatus(GetBatchStatusRequest) returns (BatchConfigUpdateResponse);
  rpc CancelBatch(CancelBatchRequest) returns (CancelBatchResponse);
  rpc RollbackBatch(RollbackBatchRequest) returns (RollbackBatchResponse);

  // ============ Configuration Templates ============
  rpc ListConfigTemplates(ListConfigTemplatesRequest) returns (ListConfigTemplatesResponse);
  rpc GetConfigTemplate(GetConfigTemplateRequest) returns (ConfigTemplate);
  rpc CreateConfigTemplate(CreateConfigTemplateRequest) returns (ConfigTemplate);
  rpc UpdateConfigTemplate(UpdateConfigTemplateRequest) returns (ConfigTemplate);
  rpc DeleteConfigTemplate(DeleteConfigTemplateRequest) returns (DeleteConfigTemplateResponse);
  rpc RenderConfigTemplate(RenderConfigTemplateRequest) returns (RenderConfigTemplateResponse);

  // ============ Maintenance Mode ============
  rpc SetMaintenance(SetMaintenanceRequest) returns (SetMaintenanceResponse);
  rpc GetMaintenanceStatus(GetMaintenanceStatusRequest) returns (MaintenanceState);
  rpc ListMaintenanceStates(ListMaintenanceStatesRequest) returns (ListMaintenanceStatesResponse);
  rpc ListMaintenanceTemplates(ListMaintenanceTemplatesRequest) returns (ListMaintenanceTemplatesResponse);
  rpc CreateMaintenanceTemplate(CreateMaintenanceTemplateRequest) returns (MaintenanceTemplate);
  rpc UpdateMaintenanceTemplate(UpdateMaintenanceTemplateRequest) returns (MaintenanceTemplate);
  rpc DeleteMaintenanceTemplate(DeleteMaintenanceTemplateRequest) returns (DeleteMaintenanceTemplateResponse);
  rpc PreviewMaintenanceTemplate(PreviewMaintenanceTemplateRequest) returns (PreviewMaintenanceTemplateResponse);

  // ============ Certificate Management ============
  rpc UploadCertificate(UploadCertificateRequest) returns (UploadCertificateResponse);
  rpc GetCertificateInventory(GetCertificateInventoryRequest) returns (GetCertificateInventoryResponse);
  rpc DeployCertificate(DeployCertificateRequest) returns (UploadCertificateResponse);
  rpc DeleteCertificate(DeleteCertificateRequest) returns (DeleteCertificateResponse);

  // ============ Environment Comparison ============
  rpc CompareEnvironments(CompareEnvironmentsRequest) returns (CompareEnvironmentsResponse);
  rpc GetComparison(GetComparisonRequest) returns (CompareEnvironmentsResponse);

  // ============ Site/Location Updates ============
  rpc UpdateSiteLocation(SiteLocationUpdateRequest) returns (SiteLocationUpdateResponse);
}

message ListAlertRulesRequest {}

message AlertRuleList {
  repeated AlertRule rules = 1;
}

message DeleteAlertRuleRequest {
  string id = 1;
}

message DeleteAlertRuleResponse {
  bool success = 1;
}

message AlertRule {
  string id = 1;
  string name = 2;
  string metric_type = 3; // "cpu", "memory", "rps", "error_rate"
  float threshold = 4;
  string comparison = 5; // "gt", "lt"
  int32 window_sec = 6;
  bool enabled = 7;
  string recipients = 8; // comma-separated emails or webhooks
}

message ExecRequest {
  string instance_id = 1;
  bytes input = 2; // stdin
  string command = 3; // optional: command to run, e.g. /bin/bash
}

message ExecResponse {
  bytes output = 1; // stdout/stderr
  int32 exit_code = 2;
  string error = 3;
}

message UpdateAgentRequest {
  string agent_id = 1;
}

message UpdateAgentResponse {
  bool success = 1;
  string message = 2;
}

// ============ Configuration Messages ============

message ConfigRequest {
  string instance_id = 1;
  string config_path = 2;
}

message ConfigResponse {
  string instance_id = 1;
  NginxConfig config = 2;
  string error = 3;
}

message NginxConfig {
  string config_path = 1;
  string content = 2;
  repeated ServerBlock servers = 3;
  repeated UpstreamBlock upstreams = 4;
  int64 last_modified = 5;
}

message ServerBlock {
  repeated string listen = 1;
  repeated string server_name = 2;
  string root = 3;
  repeated LocationBlock locations = 4;
  map<string, string> ssl_config = 5;
  map<string, string> directives = 6;
}

message LocationBlock {
  string path = 1;
  string match_type = 2;
  map<string, string> directives = 3;
  string proxy_pass = 4;
}

message UpstreamBlock {
  string name = 1;
  repeated string servers = 2;
  map<string, string> directives = 3;
}

message ConfigUpdate {
  string instance_id = 1;
  string config_path = 2;
  string new_content = 3;
  bool backup = 4;
}

message ConfigUpdateResponse {
  bool success = 1;
  string error = 2;
  string backup_path = 3;
}

message ConfigValidation {
  string instance_id = 1;
  string config_content = 2;
}

message ValidationResult {
  bool valid = 1;
  repeated string errors = 2;
  repeated string warnings = 3;
}

message ReloadRequest {
  string instance_id = 1;
}

message ReloadResponse {
  bool success = 1;
  string error = 2;
}

message RestartRequest {
  string instance_id = 1;
}

message RestartResponse {
  bool success = 1;
  string error = 2;
}

message StopRequest {
  string instance_id = 1;
}

message StopResponse {
  bool success = 1;
  string error = 2;
}

// ============ Certificate Messages ============

message CertListRequest {
  string instance_id = 1;
}

message CertListResponse {
  repeated Certificate certificates = 1;
}

message Certificate {
  string domain = 1;
  string cert_path = 2;
  string key_path = 3;
  int64 expiry_timestamp = 4;
  string issuer = 5;
  repeated string san_domains = 6;
  int32 days_until_expiry = 7;
}

// ============ Log Messages ============
message ListAgentsRequest {}

message ListAgentsResponse {
  repeated AgentInfo agents = 1;
  string system_version = 2; // Current system version (from VERSION file)
}

message RemoveAgentRequest {
  string agent_id = 1;
}

message RemoveAgentResponse {
  bool success = 1;
}

message GetAgentRequest {
  string agent_id = 1;
}

message AgentInfo {
  string agent_id = 1;
  string hostname = 2;
  string version = 3; // Nginx version of primary instance
  string status = 4;
  int32 instances_count = 5;
  string uptime = 6;
  string ip = 7;
  int64 last_seen = 8;
  string agent_version = 9;
  bool is_pod = 10;
  string pod_ip = 11;
  string build_date = 12;    // Build timestamp
  string git_commit = 13;    // Git commit hash
  string git_branch = 14;    // Git branch name
  bool psk_authenticated = 15; // true if agent connected with valid PSK
  map<string, string> labels = 16;  // Agent labels for project/environment assignment
}

message LogRequest {
  string instance_id = 1;
  string log_type = 2;
  int32 tail_lines = 3;
  bool follow = 4;
}

message LogEntry {
  int64 timestamp = 1;
  string log_type = 2;
  string content = 3;
  string remote_addr = 4;
  string request_method = 5;
  string request_uri = 6;
  int32 status = 7;
  int64 body_bytes_sent = 8;
  float request_time = 9;
  string request_id = 10;
  string upstream_addr = 11;
  string upstream_status = 12;
  float upstream_connect_time = 13;
  float upstream_header_time = 14;
  float upstream_response_time = 15;
  string referer = 16;
  string user_agent = 17;
  string x_forwarded_for = 18;  // Client IP from X-Forwarded-For header for geo lookup
}

// ============ Uptime Monitoring ============

message UptimeRequest {
  string agent_id = 1;
  int32 limit = 2;
}

message UptimeResponse {
  repeated UptimeReport reports = 1;
}

message UptimeReport {
  int64 timestamp = 1;
  string status = 2; // "UP", "DOWN", "DEGRADED"
  float latency_ms = 3;
  string check_type = 4; // "HTTP", "TCP"
  string target = 5;
  string error = 6;
}

// ============ Analytics Messages ============

message AnalyticsRequest {
  string agent_id = 1; // Optional, defaults to all
  string time_window = 2; // "1h", "24h", "7d"
  string environment_id = 3; // Optional: filter by environment
  string project_id = 4; // Optional: filter by project (all environments)
  int64 from_timestamp = 5; // Optional: absolute start time (milliseconds)
  int64 to_timestamp = 6; // Optional: absolute end time (milliseconds)
  string timezone = 7; // Optional: client timezone for formatting
}

message AnalyticsResponse {
  repeated TimeSeriesPoint request_rate = 1;
  repeated StatusCount status_distribution = 2;
  repeated LatencyPercentiles latency_trend = 3;
  repeated EndpointStat top_endpoints = 4;
  repeated NginxMetricPoint connections_history = 5;
  
  // New fields for KPI cards and distributions
  AnalyticsSummary summary = 6;
  repeated LatencyBucket latency_distribution = 7;
  repeated ServerStat server_distribution = 8;
  
  // System metrics time series
  repeated SystemMetricPoint system_metrics = 9;
  
  // HTTP status metrics
  HttpStatusMetricsResponse http_status_metrics = 10;
  
  // Actionable Insights for Decision Hub
  repeated Insight insights = 11;
  
  // Recent Requests (for detailed view)
  repeated LogEntry recent_requests = 12;

  // Gateway specific metrics
  repeated GatewayMetricPoint gateway_metrics = 13;
}

message GatewayMetricPoint {
  string time = 1;
  float eps = 2;
  int32 active_connections = 3;
  float cpu_usage = 4;
  float memory_mb = 5;
  int32 goroutines = 6;
  float db_latency = 7;
  map<string, string> labels = 8;
}

message Span {
  string trace_id = 1;
  string span_id = 2;
  string parent_span_id = 3;
  string name = 4; // e.g., "rewrite", "access", "content"
  int64 start_time = 5; // Unix nano
  int64 end_time = 6;   // Unix nano
  map<string, string> attributes = 7;
}

message Trace {
  string request_id = 1;
  repeated Span spans = 2;
  LogEntry root_entry = 3;
}

message TraceRequest {
  string agent_id = 1;
  string trace_id = 2;
  string time_window = 3;
  int32 limit = 4;

  // Search filters
  string status_filter = 5; // e.g. "404", "5xx"
  string method_filter = 6; // e.g. "GET", "POST"
  string uri_filter = 7;    // e.g. "/api/v1"
  
  // Project/environment filters
  string environment_id = 8; // Optional: filter by environment
  string project_id = 9; // Optional: filter by project
}

message TraceList {
  repeated Trace traces = 1;
}

message Insight {
  string type = 1; // "info", "warning", "critical"
  string title = 2;
  string message = 3;
  string metadata = 4;
}

// ============ Augment Messages ============

message ApplyAugmentRequest {
  string instance_id = 1;
  ConfigAugment augment = 2;
}

message ApplyAugmentResponse {
  bool success = 1;
  string error = 2;
  string preview = 3; // Generated config preview
}

message AnalyticsSummary {
  int64 total_requests = 1;
  float error_rate = 2;
  float avg_latency = 3;
  uint64 total_bandwidth = 4;
  
  // Comparison vs previous period (deltas)
  float requests_delta = 5;
  float latency_delta = 6;
  float error_rate_delta = 7;
}

message LatencyBucket {
  string bucket = 1; // e.g. "0-50ms"
  int64 count = 2;
}

message ServerStat {
  string hostname = 1;
  int64 requests = 2;
  float error_rate = 3;
  uint64 traffic = 4;
}

message NginxMetricPoint {
  int64 timestamp = 1;
  int64 active = 2;
  int64 reading = 3;
  int64 writing = 4;
  int64 waiting = 5;
  int64 accepted = 6;
  int64 handled = 7;
  int64 requests = 8;
  double requests_per_second = 9;
  string time = 10;
}

message TimeSeriesPoint {
  string time = 1;
  int64 requests = 2;
  int64 errors = 3;
}

message StatusCount {
  string code = 1;
  int64 count = 2;
}

message LatencyPercentiles {
  string time = 1;
  float p50 = 2;
  float p95 = 3;
  float p99 = 4;
}

message SystemMetricPoint {
  string time = 1;
  float cpu_usage = 2;
  float memory_usage = 3;
  float network_rx_rate = 4;
  float network_tx_rate = 5;
  float cpu_user = 6;
  float cpu_system = 7;
  float cpu_iowait = 8;
}

message HttpStatusMetricsResponse {
  repeated TimeSeriesPoint status_2xx_5min = 1;
  int64 total_status_200_24h = 2;
  repeated TimeSeriesPoint status_4xx_5min = 3;
  int64 total_status_404_24h = 4;
  repeated TimeSeriesPoint status_3xx = 5;
  repeated TimeSeriesPoint status_5xx = 6;
  int64 total_status_503 = 7;
}

message EndpointStat {
  string uri = 1;
  int64 requests = 2;
  float p95 = 3;
  int64 errors = 4;
  string traffic = 5;
}

// ============ AI Tuner Messages ============

message RecommendationRequest {
  string agent_id = 1; // Optional
}

message RecommendationResponse {
  repeated Recommendation recommendations = 1;
}

message Recommendation {
  int32 id = 1;
  string title = 2;
  string description = 3;
  string details = 4;
  string impact = 5; // "high", "medium", "low"
  string category = 6; // "Performance", "Optimization", "Security"
  float confidence = 7;
  string estimated_improvement = 8;
  string current_config = 9;
  string suggested_config = 10;
  string server = 11;
  int64 timestamp = 12;
}

// ============ Reporting Messages ============

message ReportRequest {
  int64 start_time = 1; // Unix timestamp
  int64 end_time = 2;   // Unix timestamp
  repeated string agent_ids = 3; // Optional filter
  string report_type = 4; // "summary", "detailed", "security"
}

message ReportResponse {
  int64 generated_at = 1;
  ReportSummary summary = 2;
  repeated TimeSeriesPoint traffic_trend = 3; // Reusing TimeSeriesPoint
  repeated EndpointStat top_uris = 4;         // Reusing EndpointStat
  repeated ServerStat top_servers = 5;        // Reusing ServerStat
  repeated SecurityEvent security_events = 6;
}

message ReportSummary {
  int64 total_requests = 1;
  float error_rate = 2;
  uint64 total_bandwidth = 3;
  float avg_latency = 4;
  int64 unique_visitors = 5;
}

message SecurityEvent {
  string type = 1; // "WAF", "RateLimit", "AuthFailure"
  int64 count = 2;
  string severity = 3;
}

message SendReportRequest {
  ReportRequest request = 1;
  repeated string recipients = 2;
  string subject = 3;
  string body = 4;
}

message SendReportResponse {
  bool success = 1;
  string message = 2;
}

message ReportDownloadResponse {
  bytes content = 1;
  string file_name = 2;
  string content_type = 3;
}

// ============ Agent Configuration Messages ============

message GetAgentConfigRequest {
  string agent_id = 1;
}

message AgentConfig {
  string agent_id = 1;
  
  // Gateway Configuration
  repeated string gateway_addresses = 2;  // Multiple gateway addresses for redundancy
  bool multi_gateway_mode = 3;            // Enable sending to multiple gateways
  
  // NGINX Configuration
  string nginx_status_url = 4;
  string access_log_path = 5;
  string error_log_path = 6;
  string nginx_config_path = 7;
  string log_format = 8;
  
  // Agent Settings
  int32 health_port = 9;
  int32 mgmt_port = 10;
  string log_level = 11;
  string buffer_dir = 12;
  
  // Update Settings
  string update_server = 13;
  int64 update_interval_seconds = 14;
  
  // Telemetry Settings
  int32 metrics_interval_seconds = 15;
  int32 heartbeat_interval_seconds = 16;
  
  // Feature Flags
  bool enable_vts_metrics = 17;
  bool enable_log_streaming = 18;
  bool auto_apply_config = 19;
}

message AgentConfigResponse {
  bool success = 1;
  string error = 2;
  string message = 3;
  bool requires_restart = 4;
}

// ============ Agent Groups ============

message AgentGroup {
  string id = 1;
  string environment_id = 2;
  string name = 3;
  string slug = 4;
  string description = 5;
  string golden_agent_id = 6;
  string expected_config_hash = 7;
  bool drift_check_enabled = 8;
  int32 drift_check_interval_seconds = 9;
  map<string, string> metadata = 10;
  string created_by = 11;
  int64 created_at = 12;
  int64 updated_at = 13;
  int32 agent_count = 14; // Number of agents in this group
}

message ListGroupsRequest {
  string environment_id = 1; // Required: filter by environment
}

message ListGroupsResponse {
  repeated AgentGroup groups = 1;
}

message GetGroupRequest {
  string group_id = 1;
}

message CreateGroupRequest {
  string environment_id = 1;
  string name = 2;
  string slug = 3;
  string description = 4;
  bool drift_check_enabled = 5;
  int32 drift_check_interval_seconds = 6;
  map<string, string> metadata = 7;
}

message UpdateGroupRequest {
  string group_id = 1;
  string name = 2;
  string description = 3;
  bool drift_check_enabled = 4;
  int32 drift_check_interval_seconds = 5;
  map<string, string> metadata = 6;
}

message DeleteGroupRequest {
  string group_id = 1;
}

message DeleteGroupResponse {
  bool success = 1;
  string message = 2;
}

message AddAgentsToGroupRequest {
  string group_id = 1;
  repeated string agent_ids = 2;
}

message AddAgentsToGroupResponse {
  bool success = 1;
  repeated AgentGroupAssignmentResult results = 2;
}

message AgentGroupAssignmentResult {
  string agent_id = 1;
  bool success = 2;
  string error = 3;
}

message RemoveAgentFromGroupRequest {
  string group_id = 1;
  string agent_id = 2;
}

message RemoveAgentFromGroupResponse {
  bool success = 1;
  string message = 2;
}

message SetGoldenAgentRequest {
  string group_id = 1;
  string agent_id = 2; // Empty to clear golden agent
}

message SetGoldenAgentResponse {
  bool success = 1;
  string message = 2;
}

message GetGroupAgentsRequest {
  string group_id = 1;
}

message GetGroupAgentsResponse {
  repeated AgentInfo agents = 1;
}

// ============ Drift Detection ============

message DriftCheckRequest {
  string scope = 1; // "group", "environment"
  string scope_id = 2; // group_id or environment_id
  repeated string check_types = 3; // ["nginx_main_conf", "ssl_certs", "maintenance_page"]
  string baseline_agent_id = 4; // Optional: use specific agent as baseline
  bool include_diff_content = 5;
}

message DriftCheckResponse {
  string report_id = 1;
  string scope = 2;
  string scope_id = 3;
  string check_type = 4;
  string baseline_type = 5; // "golden_agent", "majority", "template"
  string baseline_agent_id = 6;
  string baseline_hash = 7;
  int32 total_agents = 8;
  int32 in_sync_count = 9;
  int32 drifted_count = 10;
  int32 error_count = 11;
  repeated DriftItem items = 12;
  int64 created_at = 13;
}

message DriftItem {
  string agent_id = 1;
  string hostname = 2;
  string status = 3; // "in_sync", "drifted", "missing", "error"
  string current_hash = 4;
  string severity = 5; // "critical", "warning", "info"
  string diff_summary = 6; // "+3 lines, -1 line"
  string diff_content = 7; // Unified diff
  string error_message = 8;
}

message GetDriftReportRequest {
  string report_id = 1;
}

message ListDriftReportsRequest {
  string scope = 1; // "group", "environment"
  string scope_id = 2;
  int32 limit = 3;
}

message ListDriftReportsResponse {
  repeated DriftCheckResponse reports = 1;
}

message ResolveDriftRequest {
  string report_id = 1;
  repeated string agent_ids = 2; // Specific agents to resolve, empty = all drifted
  string action = 3; // "sync_to_baseline", "sync_to_agent", "acknowledge"
  string source_agent_id = 4; // For "sync_to_agent" action
}

// ============ Batch Configuration Updates ============

message BatchConfigUpdateRequest {
  // Target selection (one required)
  repeated string agent_ids = 1;
  string group_id = 2;
  string environment_id = 3;
  
  // Configuration source (one required)
  string template_id = 4;
  string raw_content = 5;
  string source_agent_id = 6; // Copy from specific agent
  
  // Variables for template
  map<string, string> variables = 7;
  
  // Strategy
  string strategy = 8; // "parallel", "rolling", "canary"
  int32 batch_size = 9;
  int32 pause_between_batches_seconds = 10;
  
  // Canary options
  int32 canary_percentage = 11;
  int32 canary_duration_seconds = 12;
  
  // Safety options
  bool dry_run = 13;
  bool validate_only = 14;
  bool backup_first = 15;
  bool rollback_on_fail = 16;
  
  // Metadata
  string description = 17;
}

message BatchConfigUpdateResponse {
  string batch_id = 1;
  string status = 2; // "pending", "in_progress", "completed", "partial_failure", "failed", "cancelled", "rolled_back"
  string strategy = 3;
  int32 total_agents = 4;
  int32 current_batch = 5;
  int32 total_batches = 6;
  int32 completed_count = 7;
  int32 failed_count = 8;
  int32 pending_count = 9;
  repeated AgentUpdateResult results = 10;
  int64 started_at = 11;
  int64 completed_at = 12;
  string error = 13;
}

message AgentUpdateResult {
  string agent_id = 1;
  string hostname = 2;
  string status = 3; // "success", "failed", "skipped", "rolled_back", "pending"
  string backup_path = 4;
  string config_hash = 5;
  string error = 6;
  int32 duration_ms = 7;
  int64 completed_at = 8;
}

message GetBatchStatusRequest {
  string batch_id = 1;
}

message CancelBatchRequest {
  string batch_id = 1;
}

message CancelBatchResponse {
  bool success = 1;
  string message = 2;
}

message RollbackBatchRequest {
  string batch_id = 1;
}

message RollbackBatchResponse {
  bool success = 1;
  string message = 2;
  repeated AgentUpdateResult results = 3;
}

// ============ Configuration Templates ============

message ConfigTemplate {
  string id = 1;
  string project_id = 2;
  string environment_id = 3;
  string group_id = 4;
  string name = 5;
  string description = 6;
  string template_type = 7; // 'nginx_main_conf', 'server_block', 'location_block'
  string content = 8;
  repeated TemplateVariable variables = 9;
  map<string, string> defaults = 10;
  int32 version = 11;
  bool is_active = 12;
  string created_by = 13;
  int64 created_at = 14;
  int64 updated_at = 15;
}

message TemplateVariable {
  string name = 1;
  string description = 2;
  bool required = 3;
  string default_value = 4;
  string validation = 5; // Regex pattern
  repeated string options = 6; // For enum types
}

message ListConfigTemplatesRequest {
  string project_id = 1;
  string environment_id = 2;
  string group_id = 3;
  string template_type = 4;
}

message ListConfigTemplatesResponse {
  repeated ConfigTemplate templates = 1;
}

message GetConfigTemplateRequest {
  string template_id = 1;
}

message CreateConfigTemplateRequest {
  string project_id = 1;
  string environment_id = 2;
  string group_id = 3;
  string name = 4;
  string description = 5;
  string template_type = 6;
  string content = 7;
  repeated TemplateVariable variables = 8;
  map<string, string> defaults = 9;
}

message UpdateConfigTemplateRequest {
  string template_id = 1;
  string name = 2;
  string description = 3;
  string content = 4;
  repeated TemplateVariable variables = 5;
  map<string, string> defaults = 6;
  bool is_active = 7;
}

message DeleteConfigTemplateRequest {
  string template_id = 1;
}

message DeleteConfigTemplateResponse {
  bool success = 1;
  string message = 2;
}

message RenderConfigTemplateRequest {
  string template_id = 1;
  map<string, string> variables = 2;
}

message RenderConfigTemplateResponse {
  string rendered_content = 1;
  bool valid = 2;
  repeated string validation_errors = 3;
}

// ============ Maintenance Mode ============

message MaintenanceTemplate {
  string id = 1;
  string project_id = 2;
  string name = 3;
  string description = 4;
  string html_content = 5;
  string css_content = 6;
  map<string, string> assets = 7; // filename -> base64 content
  repeated TemplateVariable variables = 8;
  bool is_default = 9;
  bool is_built_in = 10;
  string created_by = 11;
  int64 created_at = 12;
  int64 updated_at = 13;
}

message MaintenanceState {
  string id = 1;
  string scope = 2; // "agent", "group", "environment", "project", "site", "location"
  string scope_id = 3;
  string site_filter = 4;
  string location_filter = 5;
  string template_id = 6;
  map<string, string> template_vars = 7;
  bool is_enabled = 8;
  int64 enabled_at = 9;
  string enabled_by = 10;
  string schedule_type = 11; // "immediate", "scheduled", "recurring"
  int64 scheduled_start = 12;
  int64 scheduled_end = 13;
  string recurrence_rule = 14;
  string timezone = 15;
  repeated string bypass_ips = 16;
  map<string, string> bypass_headers = 17;
  string reason = 18;
}

message SetMaintenanceRequest {
  string action = 1; // "enable", "disable", "schedule", "cancel_schedule"
  string scope = 2;
  string scope_id = 3;
  string site_filter = 4;
  string location_filter = 5;
  string template_id = 6;
  map<string, string> template_vars = 7;
  string schedule_type = 8;
  int64 scheduled_start = 9;
  int64 scheduled_end = 10;
  string recurrence_rule = 11;
  string timezone = 12;
  repeated string bypass_ips = 13;
  map<string, string> bypass_headers = 14;
  string reason = 15;
}

message SetMaintenanceResponse {
  bool success = 1;
  string maintenance_state_id = 2;
  repeated AgentMaintenanceResult results = 3;
  string error = 4;
}

message AgentMaintenanceResult {
  string agent_id = 1;
  string hostname = 2;
  bool success = 3;
  string error = 4;
}

message GetMaintenanceStatusRequest {
  string scope = 1;
  string scope_id = 2;
  string site_filter = 3;
  string location_filter = 4;
}

message ListMaintenanceStatesRequest {
  string project_id = 1;
  string environment_id = 2;
  bool enabled_only = 3;
}

message ListMaintenanceStatesResponse {
  repeated MaintenanceState states = 1;
}

message ListMaintenanceTemplatesRequest {
  string project_id = 1;
}

message ListMaintenanceTemplatesResponse {
  repeated MaintenanceTemplate templates = 1;
}

message CreateMaintenanceTemplateRequest {
  string project_id = 1;
  string name = 2;
  string description = 3;
  string html_content = 4;
  string css_content = 5;
  map<string, string> assets = 6;
  repeated TemplateVariable variables = 7;
  bool is_default = 8;
}

message UpdateMaintenanceTemplateRequest {
  string template_id = 1;
  string name = 2;
  string description = 3;
  string html_content = 4;
  string css_content = 5;
  map<string, string> assets = 6;
  repeated TemplateVariable variables = 7;
  bool is_default = 8;
}

message DeleteMaintenanceTemplateRequest {
  string template_id = 1;
}

message DeleteMaintenanceTemplateResponse {
  bool success = 1;
  string message = 2;
}

message PreviewMaintenanceTemplateRequest {
  string template_id = 1;
  map<string, string> variables = 2;
}

message PreviewMaintenanceTemplateResponse {
  string rendered_html = 1;
}

// ============ Certificate Management ============

message CertificateInventoryItem {
  string id = 1;
  string domain = 2;
  string environment_id = 3;
  string cert_type = 4; // "letsencrypt", "commercial", "self_signed"
  string issuer = 5;
  int64 expiry_timestamp = 6;
  int32 days_until_expiry = 7;
  repeated string san_domains = 8;
  bool auto_renew = 9;
  int32 deployed_to_count = 10;
  string cert_content_hash = 11;
  int64 created_at = 12;
  int64 updated_at = 13;
}

message UploadCertificateRequest {
  string domain = 1;
  bytes cert_content = 2; // PEM format
  bytes key_content = 3;
  bytes chain_content = 4; // Intermediate certs
  string cert_type = 5;
  string environment_id = 6;
  // Target selection for immediate deployment
  repeated string agent_ids = 7;
  string group_id = 8;
  bool backup_existing = 9;
  bool reload_nginx = 10;
}

message UploadCertificateResponse {
  bool success = 1;
  string certificate_id = 2;
  repeated CertDeploymentResult deployments = 3;
  string error = 4;
}

message CertDeploymentResult {
  string agent_id = 1;
  string hostname = 2;
  bool success = 3;
  string cert_path = 4;
  string key_path = 5;
  string error = 6;
}

message GetCertificateInventoryRequest {
  string environment_id = 1;
  bool expiring_only = 2;
  int32 expiring_within_days = 3;
}

message GetCertificateInventoryResponse {
  repeated CertificateInventoryItem certificates = 1;
}

message DeployCertificateRequest {
  string certificate_id = 1;
  repeated string agent_ids = 2;
  string group_id = 3;
  string environment_id = 4;
  bool backup_existing = 5;
  bool reload_nginx = 6;
}

message DeleteCertificateRequest {
  string certificate_id = 1;
}

message DeleteCertificateResponse {
  bool success = 1;
  string message = 2;
}

// ============ Environment Comparison ============

message CompareEnvironmentsRequest {
  string source_environment_id = 1;
  string target_environment_id = 2;
  repeated string compare_types = 3; // ["nginx_main_conf", "ssl_certs", "maintenance"]
  bool include_diff_content = 4;
  map<string, string> group_mapping = 5; // source_group_id -> target_group_id
}

message CompareEnvironmentsResponse {
  string comparison_id = 1;
  string source_environment = 2;
  string target_environment = 3;
  int64 compared_at = 4;
  repeated ComparisonCategory categories = 5;
  ComparisonSummary summary = 6;
}

message ComparisonCategory {
  string type = 1;
  int32 source_count = 2;
  int32 target_count = 3;
  int32 same_count = 4;
  int32 different_count = 5;
  int32 source_only_count = 6;
  int32 target_only_count = 7;
  repeated ConfigDifference differences = 8;
}

message ConfigDifference {
  string identifier = 1; // filename, domain, etc.
  string status = 2; // "same", "different", "source_only", "target_only"
  string source_value = 3;
  string target_value = 4;
  string diff = 5; // Unified diff
  string severity = 6;
}

message ComparisonSummary {
  int32 total_checks = 1;
  int32 identical_count = 2;
  int32 different_count = 3;
  bool has_critical_diffs = 4;
}

message GetComparisonRequest {
  string comparison_id = 1;
}

// ============ Site/Location Updates ============

message SiteLocationUpdateRequest {
  string target = 1; // "agent", "group", "environment"
  string target_id = 2;
  string server_name = 3;
  string location_path = 4;
  string action = 5; // "create", "update", "delete"
  LocationConfigData config = 6;
  bool dry_run = 7;
  bool backup_first = 8;
  bool reload_nginx = 9;
}

message LocationConfigData {
  string proxy_pass = 1;
  map<string, string> proxy_headers = 2;
  int32 proxy_connect_timeout = 3;
  int32 proxy_read_timeout = 4;
  RateLimitConfigData rate_limit = 5;
  CacheConfigData cache = 6;
  repeated string allowed_methods = 7;
  repeated string deny_ips = 8;
  repeated string allow_ips = 9;
  string custom_directives = 10;
}

message RateLimitConfigData {
  string zone = 1;
  string rate = 2; // e.g., "10r/s"
  int32 burst = 3;
  bool no_delay = 4;
}

message CacheConfigData {
  string zone = 1;
  repeated string valid = 2; // ["200 302 10m", "404 1m"]
  repeated string methods = 3;
  string key = 4;
  string bypass_var = 5;
}

message SiteLocationUpdateResponse {
  bool success = 1;
  repeated AgentUpdateResult results = 2;
  string validation_error = 3;
}
