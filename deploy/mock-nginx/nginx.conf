server {
  listen 80;
  server_name localhost;

  # Standard 2xx
  location /health     { return 200 "OK\n"; }
  location /api/v1/    { return 200 '{"status":"ok"}'; }
  location /index      { return 200 "Welcome to Avika Mock NGINX\n"; }

  # Redirects 3xx
  location /legacy     { return 301 http://$host/api/v1/; }
  location /redirect   { return 302 /api/v1/; }

  # Client Errors 4xx
  location /forbidden  { return 403; }
  location /not-found  { return 404; }
  location /rate-limit { return 429; }

  # Server Errors 5xx
  location /error      { return 500; }
  location /upstream   { return 502; }
  location /timeout    { return 504; }

  # Default
  location / {
    root /usr/share/nginx/html;
    index index.html;
  }
}
