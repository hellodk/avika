{{- if .Values.haproxy.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "avika.fullname" . }}-haproxy
  labels:
    {{- include "avika.labels" . | nindent 4 }}
    component: haproxy
spec:
  type: LoadBalancer
  ports:
    - port: 443
      targetPort: https
      protocol: TCP
      name: https
    - port: 80
      targetPort: http
      protocol: TCP
      name: http
  selector:
    {{- include "avika.selectorLabels" . | nindent 4 }}
    component: haproxy
{{- end }}
