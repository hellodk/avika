{{- /*
Generic Deployment Template
Iterates over all components defined in .Values.components and creates Deployments
*/ -}}
{{- range $name, $component := .Values.components }}
{{- if and $component.enabled (ne $component.kind "StatefulSet") }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "avika.fullname" $ }}-{{ $name }}
  labels:
    {{- include "avika.labels" $ | nindent 4 }}
    component: {{ $name }}
spec:
  replicas: {{ $component.replicaCount | default 1 }}
  selector:
    matchLabels:
      {{- include "avika.selectorLabels" $ | nindent 6 }}
      component: {{ $name }}
  template:
    metadata:
      {{- with $component.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      labels:
        {{- include "avika.selectorLabels" $ | nindent 8 }}
        component: {{ $name }}
    spec:
      {{- with $.Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- if $component.serviceAccountName }}
      serviceAccountName: {{ $component.serviceAccountName }}
      {{- else if $.Values.serviceAccount.create }}
      serviceAccountName: {{ include "avika.serviceAccountName" $ }}
      {{- end }}
      {{- if $component.terminationGracePeriodSeconds }}
      terminationGracePeriodSeconds: {{ $component.terminationGracePeriodSeconds }}
      {{- end }}
      {{- with $.Values.podSecurityContext }}
      securityContext:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- /* Init Containers - special handling for gateway */ -}}
      {{- if eq $name "gateway" }}
      initContainers:
        - name: wait-for-postgres
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              echo "Waiting for PostgreSQL..."
              while ! nc -z {{ include "avika.fullname" $ }}-postgresql 5432 2>/dev/null; do
                sleep 2
              done
              echo "PostgreSQL is ready"
          resources:
            requests: { cpu: 10m, memory: 32Mi }
            limits: { cpu: 100m, memory: 64Mi }
        - name: wait-for-clickhouse
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              echo "Waiting for ClickHouse..."
              CH_HOST="{{ include "avika.fullname" $ }}-clickhouse-0.{{ include "avika.fullname" $ }}-clickhouse.{{ $.Release.Namespace }}.svc.cluster.local"
              while ! wget -q -O /dev/null http://${CH_HOST}:8123/ping 2>/dev/null; do
                sleep 2
              done
              echo "ClickHouse is ready"
          resources:
            requests: { cpu: 10m, memory: 32Mi }
            limits: { cpu: 100m, memory: 64Mi }
      {{- else if $component.initContainers }}
      initContainers:
        {{- toYaml $component.initContainers | nindent 8 }}
      {{- end }}
      containers:
        - name: {{ $name }}
          {{- $imgRepo := $component.image.repository }}
          {{- if $component.image.useGlobalRegistry }}
          {{- $imgRepo = printf "%s/%s" ($.Values.global.imageRegistry | default "docker.io/hellodk") $component.image.repository }}
          {{- end }}
          image: "{{ $imgRepo }}:{{ $component.image.tag | default $.Chart.AppVersion }}"
          imagePullPolicy: {{ $component.image.pullPolicy | default "IfNotPresent" }}
          {{- with $.Values.securityContext }}
          securityContext:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- /* Ports */ -}}
          {{- if $component.ports }}
          ports:
            {{- range $portName, $port := $component.ports }}
            - name: {{ $portName }}
              containerPort: {{ $port.containerPort }}
              protocol: {{ $port.protocol | default "TCP" }}
            {{- end }}
          {{- end }}
          env:
            {{- range $envName, $envValue := $component.env }}
            - name: {{ $envName }}
              value: {{ $envValue | quote }}
            {{- end }}
            - name: TZ
              value: {{ $.Values.timezone | default "UTC" }}
            {{- if eq $name "gateway" }}
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "avika.fullname" $ }}-db-secrets
                  key: postgres-password
            - name: DB_DSN
              value: "postgres://admin:$(POSTGRES_PASSWORD)@{{ include "avika.fullname" $ }}-postgresql:5432/avika?sslmode=disable"
            - name: CLICKHOUSE_ADDR
              value: "{{ include "avika.fullname" $ }}-clickhouse-0.{{ include "avika.fullname" $ }}-clickhouse.{{ $.Release.Namespace }}.svc.cluster.local:9000"
            - name: CLICKHOUSE_USER
              value: "default"
            - name: CLICKHOUSE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "avika.fullname" $ }}-db-secrets
                  key: clickhouse-password
            {{- if (index $.Values.components "redpanda").enabled }}
            - name: KAFKA_BROKERS
              value: "{{ include "avika.fullname" $ }}-redpanda:9092"
            {{- end }}
            {{- if $.Values.auth.passwordHash }}
            - name: AUTH_PASSWORD_HASH
              valueFrom:
                secretKeyRef:
                  name: {{ include "avika.fullname" $ }}-auth-secrets
                  key: password-hash
            {{ end }}
            {{- /* LLM/AI Configuration */ -}}
            {{- if $.Values.llm }}
            {{- if $.Values.llm.enabled }}
            - name: LLM_ENABLED
              value: "true"
            - name: LLM_PROVIDER
              value: {{ $.Values.llm.provider | default "openai" | quote }}
            - name: LLM_MODEL
              value: {{ $.Values.llm.model | default "gpt-4-turbo" | quote }}
            {{- if $.Values.llm.baseUrl }}
            - name: LLM_BASE_URL
              value: {{ $.Values.llm.baseUrl | quote }}
            {{- end }}
            - name: LLM_MAX_TOKENS
              value: {{ $.Values.llm.maxTokens | default 4096 | quote }}
            - name: LLM_TEMPERATURE
              value: {{ $.Values.llm.temperature | default 0.3 | quote }}
            - name: LLM_TIMEOUT_SECONDS
              value: {{ $.Values.llm.timeoutSeconds | default 60 | quote }}
            - name: LLM_RETRY_ATTEMPTS
              value: {{ $.Values.llm.retryAttempts | default 3 | quote }}
            - name: LLM_RATE_LIMIT_RPM
              value: {{ $.Values.llm.rateLimitRpm | default 60 | quote }}
            - name: LLM_ENABLE_CACHING
              value: {{ $.Values.llm.enableCaching | default true | quote }}
            - name: LLM_CACHE_TTL_MINUTES
              value: {{ $.Values.llm.cacheTtlMinutes | default 30 | quote }}
            {{- if $.Values.llm.fallbackProvider }}
            - name: LLM_FALLBACK_PROVIDER
              value: {{ $.Values.llm.fallbackProvider | quote }}
            {{- end }}
            {{- /* LLM API Key from secret */ -}}
            {{- if or $.Values.llm.existingSecret $.Values.llm.apiKey }}
            - name: LLM_API_KEY
              valueFrom:
                secretKeyRef:
                  {{- if $.Values.llm.existingSecret }}
                  name: {{ $.Values.llm.existingSecret }}
                  key: {{ $.Values.llm.existingSecretKey | default "api-key" }}
                  {{- else }}
                  name: {{ include "avika.fullname" $ }}-llm-secrets
                  key: api-key
                  {{ end }}
            {{ end }}
            {{ end }}
            {{- end }}

            {{- /* SSO / Enterprise Auth Configuration */ -}}
            - name: OIDC_ENABLED
              value: {{ $.Values.oidc.enabled | quote }}
            - name: OIDC_PROVIDER_URL
              value: {{ $.Values.oidc.providerUrl | quote }}
            - name: OIDC_CLIENT_ID
              value: {{ $.Values.oidc.clientId | quote }}
            - name: OIDC_CLIENT_SECRET
              value: {{ $.Values.oidc.clientSecret | quote }}
            - name: OIDC_REDIRECT_URL
              value: {{ $.Values.oidc.redirectUrl | quote }}
            - name: OIDC_SCOPES
              value: {{ join "," $.Values.oidc.scopes | quote }}
            - name: OIDC_GROUPS_CLAIM
              value: {{ $.Values.oidc.groupsClaim | quote }}
            - name: OIDC_DEFAULT_ROLE
              value: {{ $.Values.oidc.defaultRole | quote }}
            - name: OIDC_AUTO_PROVISION
              value: {{ $.Values.oidc.autoProvision | quote }}
            - name: OIDC_GROUP_MAPPING
              value: {{ $.Values.oidc.groupMapping | toJson | quote }}

            - name: LDAP_ENABLED
              value: {{ $.Values.ldap.enabled | quote }}
            - name: LDAP_URL
              value: {{ $.Values.ldap.url | quote }}
            - name: LDAP_BIND_DN
              value: {{ $.Values.ldap.bindDN | quote }}
            - name: LDAP_BIND_PASSWORD
              value: {{ $.Values.ldap.bindPassword | quote }}
            - name: LDAP_BASE_DN
              value: {{ $.Values.ldap.baseDN | quote }}
            - name: LDAP_USER_FILTER
              value: {{ $.Values.ldap.userFilter | quote }}
            - name: LDAP_GROUP_FILTER
              value: {{ $.Values.ldap.groupFilter | quote }}
            - name: LDAP_DEFAULT_ROLE
              value: {{ $.Values.ldap.defaultRole | quote }}
            - name: LDAP_AUTO_PROVISION
              value: {{ $.Values.ldap.autoProvision | quote }}
            - name: LDAP_GROUP_MAPPING
              value: {{ $.Values.ldap.groupMapping | toJson | quote }}

            - name: SAML_ENABLED
              value: {{ $.Values.saml.enabled | quote }}
            - name: SAML_IDP_METADATA_URL
              value: {{ $.Values.saml.idpMetadataUrl | quote }}
            - name: SAML_ENTITY_ID
              value: {{ $.Values.saml.entityId | quote }}
            - name: SAML_ROOT_URL
              value: {{ $.Values.saml.rootUrl | quote }}
            - name: SAML_CERT_FILE
              value: {{ $.Values.saml.certFile | quote }}
            - name: SAML_KEY_FILE
              value: {{ $.Values.saml.keyFile | quote }}
            - name: SAML_GROUPS_CLAIM
              value: {{ $.Values.saml.groupsClaim | quote }}
            - name: SAML_DEFAULT_ROLE
              value: {{ $.Values.saml.defaultRole | quote }}
            - name: SAML_AUTO_PROVISION
              value: {{ $.Values.saml.autoProvision | quote }}
            - name: SAML_GROUP_MAPPING
              value: {{ $.Values.saml.groupMapping | toJson | quote }}
            {{- end }}
            {{- /* Frontend-specific dynamic env vars */ -}}
            {{- if eq $name "frontend" }}
            {{- if $.Values.gatewayExternalUrl }}
            - name: NEXT_PUBLIC_GATEWAY_URL
              value: {{ $.Values.gatewayExternalUrl | quote }}
            - name: NEXT_PUBLIC_WS_URL
              value: {{ $.Values.gatewayExternalUrl | replace "https://" "wss://" | replace "http://" "ws://" | quote }}
            - name: GATEWAY_GRPC_ADDR
              value: "{{ include "avika.fullname" $ }}-gateway:5020"
            - name: GATEWAY_HTTP_URL
              value: {{ $.Values.gatewayExternalUrl | quote }}
            - name: GATEWAY_EXTERNAL_URL
              value: {{ $.Values.gatewayExternalUrl | quote }}
            {{- else }}
            - name: NEXT_PUBLIC_GATEWAY_URL
              value: "http://{{ include "avika.fullname" $ }}-gateway:5020"
            - name: NEXT_PUBLIC_WS_URL
              value: "ws://{{ include "avika.fullname" $ }}-gateway:5021"
            - name: GATEWAY_GRPC_ADDR
              value: "{{ include "avika.fullname" $ }}-gateway:5020"
            - name: GATEWAY_HTTP_URL
              value: "http://{{ include "avika.fullname" $ }}-gateway:5021"
            {{- end }}
            {{- if $.Values.grafana.url }}
            - name: NEXT_PUBLIC_GRAFANA_URL
              value: {{ $.Values.grafana.url | quote }}
            {{- end }}
            {{- end }}
          {{- /* Liveness Probe */ -}}
          {{- if $component.livenessProbe }}
          livenessProbe:
            {{- if $component.livenessProbe.httpGet }}
            httpGet:
              path: {{ $component.livenessProbe.httpGet.path }}
              port: {{ $component.livenessProbe.httpGet.port }}
            {{- else if $component.livenessProbe.exec }}
            exec:
              command:
                {{- toYaml $component.livenessProbe.exec.command | nindent 16 }}
            {{- else if $component.livenessProbe.tcpSocket }}
            tcpSocket:
              port: {{ $component.livenessProbe.tcpSocket.port }}
            {{- end }}
            initialDelaySeconds: {{ $component.livenessProbe.initialDelaySeconds | default 15 }}
            periodSeconds: {{ $component.livenessProbe.periodSeconds | default 15 }}
            timeoutSeconds: {{ $component.livenessProbe.timeoutSeconds | default 5 }}
            failureThreshold: {{ $component.livenessProbe.failureThreshold | default 3 }}
          {{- end }}
          {{- /* Readiness Probe */ -}}
          {{- if $component.readinessProbe }}
          readinessProbe:
            {{- if $component.readinessProbe.httpGet }}
            httpGet:
              path: {{ $component.readinessProbe.httpGet.path }}
              port: {{ $component.readinessProbe.httpGet.port }}
            {{- else if $component.readinessProbe.exec }}
            exec:
              command:
                {{- toYaml $component.readinessProbe.exec.command | nindent 16 }}
            {{- else if $component.readinessProbe.tcpSocket }}
            tcpSocket:
              port: {{ $component.readinessProbe.tcpSocket.port }}
            {{- end }}
            initialDelaySeconds: {{ $component.readinessProbe.initialDelaySeconds | default 5 }}
            periodSeconds: {{ $component.readinessProbe.periodSeconds | default 10 }}
            timeoutSeconds: {{ $component.readinessProbe.timeoutSeconds | default 5 }}
            failureThreshold: {{ $component.readinessProbe.failureThreshold | default 3 }}
          {{- end }}
          {{- /* Volume Mounts */ -}}
          {{- if $component.volumeMounts }}
          volumeMounts:
            {{- toYaml $component.volumeMounts | nindent 12 }}
          {{- end }}
          {{- /* Resources */ -}}
          {{- with $component.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
        {{- /* Sidecar Containers */ -}}
        {{- range $sidecar := $component.sidecars }}
        - name: {{ $sidecar.name }}
          {{- $sidecarImg := $sidecar.image.repository }}
          {{- if $sidecar.image.useGlobalRegistry }}
          {{- $sidecarImg = printf "%s/%s" ($.Values.global.imageRegistry | default "docker.io/hellodk") $sidecar.image.repository }}
          {{- end }}
          image: "{{ $sidecarImg }}:{{ $sidecar.image.tag | default $.Chart.AppVersion }}"
          imagePullPolicy: {{ $sidecar.image.pullPolicy | default "IfNotPresent" }}
          {{- if $sidecar.ports }}
          ports:
            {{- range $portName, $port := $sidecar.ports }}
            - name: {{ $portName }}
              containerPort: {{ $port.containerPort }}
              protocol: {{ $port.protocol | default "TCP" }}
            {{- end }}
          {{- end }}
          {{- if $sidecar.env }}
          env:
            {{- range $envName, $envValue := $sidecar.env }}
            - name: {{ $envName }}
              value: {{ $envValue | quote }}
            {{- end }}
          {{- end }}
          {{- if $sidecar.livenessProbe }}
          livenessProbe:
            {{- toYaml $sidecar.livenessProbe | nindent 12 }}
          {{- end }}
          {{- if $sidecar.readinessProbe }}
          readinessProbe:
            {{- toYaml $sidecar.readinessProbe | nindent 12 }}
          {{- end }}
          {{- if $sidecar.volumeMounts }}
          volumeMounts:
            {{- toYaml $sidecar.volumeMounts | nindent 12 }}
          {{- end }}
          {{- with $sidecar.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
        {{- end }}
      {{- /* Volumes */ -}}
      {{- if $component.volumes }}
      volumes:
        {{- toYaml $component.volumes | nindent 8 }}
      {{- end }}
      {{- with $.Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with $.Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with $.Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
{{- /* HorizontalPodAutoscaler */ -}}
{{- if and $component.autoscaling $component.autoscaling.enabled }}
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: {{ include "avika.fullname" $ }}-{{ $name }}
  labels:
    {{- include "avika.labels" $ | nindent 4 }}
    component: {{ $name }}
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: {{ include "avika.fullname" $ }}-{{ $name }}
  minReplicas: {{ $component.autoscaling.minReplicas | default 1 }}
  maxReplicas: {{ $component.autoscaling.maxReplicas | default 10 }}
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: {{ $component.autoscaling.targetCPUUtilizationPercentage | default 70 }}
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: {{ $component.autoscaling.targetMemoryUtilizationPercentage | default 80 }}
{{- end }}
{{- /* PodDisruptionBudget */ -}}
{{- if and $component.podDisruptionBudget $component.podDisruptionBudget.enabled }}
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: {{ include "avika.fullname" $ }}-{{ $name }}
  labels:
    {{- include "avika.labels" $ | nindent 4 }}
    component: {{ $name }}
spec:
  minAvailable: {{ $component.podDisruptionBudget.minAvailable | default 1 }}
  selector:
    matchLabels:
      {{- include "avika.selectorLabels" $ | nindent 6 }}
      component: {{ $name }}
{{- end }}
{{- end }}
{{- end }}
