{{- if .Values.haproxy.enabled }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "avika.fullname" . }}-haproxy-config
  labels:
    {{- include "avika.labels" . | nindent 4 }}
    component: haproxy
data:
  haproxy.cfg: |
    global
        log stdout format raw local0 info
        maxconn 50000
        daemon

    defaults
        log     global
        mode    http
        option  httplog
        option  dontlognull
        timeout connect 5s
        timeout client  50s
        timeout server  50s
        timeout tunnel  1h

    frontend avika_https
        bind *:8080
        bind *:8443 ssl crt /etc/haproxy/certs/avika.pem alpn h2,http/1.1
        mode http
        option httplog

        acl is_root path /
        http-request redirect location /avika if is_root

        # Routing ACLs
        acl is_avika_api path_beg /avika/api/
        acl is_avika_updates path_beg /avika/updates/
        acl is_install_script path /avika/updates/install
        acl is_avika_terminal path_beg /avika/terminal
        acl is_avika path_beg /avika
        acl is_grpc path_beg /nginx.agent.v1. /grpc.health.v1.

        # Mark backends before path rewrites
        http-request set-var(txn.route) str(api) if is_avika_api
        http-request set-var(txn.route) str(install) if is_install_script
        http-request set-var(txn.route) str(updates) if is_avika_updates !is_install_script
        http-request set-var(txn.route) str(terminal) if is_avika_terminal
        http-request set-var(txn.route) str(grpc) if is_grpc
        http-request set-var(txn.route) str(ui) if is_avika !is_avika_api !is_avika_updates !is_avika_terminal

        # Rewrites (strip /avika prefix for gateway)
        http-request set-path %[path,regsub(^/avika/api/,/api/)] if is_avika_api
        http-request set-path %[path,regsub(^/avika/updates/,/updates/)] if is_avika_updates !is_install_script
        http-request set-path %[path,regsub(^/avika/terminal,/terminal)] if is_avika_terminal

        # Add X-Forwarded-Proto for scheme detection
        http-request set-header X-Forwarded-Proto https if { ssl_fc }
        http-request set-header X-Forwarded-Proto http unless { ssl_fc }

        # Backend selection
        use_backend avika_grpc_backend if { var(txn.route) -m str grpc }
        use_backend avika_frontend_backend if { var(txn.route) -m str install }
        use_backend avika_gateway_backend if { var(txn.route) -m str api } || { var(txn.route) -m str updates }
        use_backend avika_gateway_backend if { var(txn.route) -m str terminal }
        use_backend avika_frontend_backend if { var(txn.route) -m str ui }
        default_backend avika_frontend_backend

    backend avika_frontend_backend
        mode http
        balance roundrobin
        server frontend {{ include "avika.fullname" . }}-frontend.{{ .Release.Namespace }}.svc.cluster.local:443 check resolvers k8s

    backend avika_gateway_backend
        mode http
        balance roundrobin
        server gateway {{ include "avika.fullname" . }}-gateway.{{ .Release.Namespace }}.svc.cluster.local:443 check resolvers k8s

    backend avika_grpc_backend
        mode http
        balance leastconn
        server gateway {{ include "avika.fullname" . }}-gateway.{{ .Release.Namespace }}.svc.cluster.local:{{ .Values.components.gateway.ports.grpc.servicePort }} proto h2 check resolvers k8s

    resolvers k8s
        nameserver coredns 10.96.0.10:53
        resolve_retries 3
        timeout retry   1s
        hold valid      10s
{{- end }}
