{{- /*
Temporary Grafana in avika namespace for testing dashboards and ClickHouse datasource.
Enable with: grafana.temporary.enabled: true
Then: kubectl port-forward -n avika svc/avika-grafana-temporary 3000:3000
*/ -}}
{{- if .Values.grafana.temporary.enabled }}
{{- $clickhouseHost := .Values.grafana.datasources.clickhouse.host | default (printf "%s-clickhouse-0.%s-clickhouse.%s.svc.cluster.local" (include "avika.fullname" .) (include "avika.fullname" .) .Release.Namespace) }}
{{- $secret := lookup "v1" "Secret" .Release.Namespace (printf "%s-db-secrets" (include "avika.fullname" .)) }}
{{- $passwordFromSecret := "" }}
{{- if and $secret (index $secret.data "clickhouse-password") }}
{{- $passwordFromSecret = index $secret.data "clickhouse-password" | b64dec }}
{{- end }}
{{- $clickhousePassword := .Values.grafana.datasources.clickhouse.password | default $passwordFromSecret }}
---
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "avika.fullname" . }}-grafana-temporary-admin
  labels:
    {{- include "avika.labels" . | nindent 4 }}
type: Opaque
stringData:
  admin-password: {{ .Values.grafana.temporary.adminPass | quote }}
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "avika.fullname" . }}-grafana-temporary-datasources
  labels:
    {{- include "avika.labels" . | nindent 4 }}
data:
  clickhouse.yaml: |
    apiVersion: 1
    datasources:
      - name: {{ .Values.grafana.datasources.clickhouse.name }}
        type: grafana-clickhouse-datasource
        uid: {{ .Values.grafana.datasources.clickhouse.uid }}
        access: proxy
        isDefault: true
        editable: false
        jsonData:
          host: {{ $clickhouseHost | quote }}
          port: {{ .Values.grafana.datasources.clickhouse.port }}
          protocol: http
          secure: false
          username: {{ .Values.grafana.datasources.clickhouse.username | default "default" | quote }}
          defaultDatabase: {{ .Values.grafana.datasources.clickhouse.database | default "nginx_analytics" }}
          dialTimeout: {{ .Values.grafana.datasources.clickhouse.dialTimeout | default 10 }}
          queryTimeout: {{ .Values.grafana.datasources.clickhouse.queryTimeout | default 60 }}
        {{- if $clickhousePassword }}
        secureJsonData:
          password: {{ $clickhousePassword | quote }}
        {{- end }}
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "avika.fullname" . }}-grafana-temporary-dashboard-provider
  labels:
    {{- include "avika.labels" . | nindent 4 }}
data:
  default.yaml: |
    apiVersion: 1
    providers:
      - name: 'Avika'
        orgId: 1
        folder: 'Avika'
        type: file
        disableDeletion: false
        updateIntervalSeconds: 30
        allowUiUpdates: true
        options:
          path: /var/lib/grafana/dashboards
---
{{- $root := . }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "avika.fullname" . }}-grafana-temporary-dashboards
  labels:
    {{- include "avika.labels" . | nindent 4 }}
data:
  {{- range $path, $_ := .Files.Glob "dashboards/*.json" }}
  {{ base $path }}: |
{{ $root.Files.Get $path | indent 4 }}
  {{- end }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "avika.fullname" . }}-grafana-temporary
  labels:
    {{- include "avika.labels" . | nindent 4 }}
    app.kubernetes.io/component: grafana-temporary
spec:
  replicas: 1
  selector:
    matchLabels:
      {{- include "avika.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: grafana-temporary
  template:
    metadata:
      labels:
        {{- include "avika.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: grafana-temporary
    spec:
      containers:
        - name: grafana
          image: {{ .Values.grafana.temporary.image.repository }}:{{ .Values.grafana.temporary.image.tag }}
          imagePullPolicy: {{ .Values.grafana.temporary.image.pullPolicy }}
          env:
            - name: GF_SECURITY_ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "avika.fullname" . }}-grafana-temporary-admin
                  key: admin-password
            - name: GF_INSTALL_PLUGINS
              value: "grafana-clickhouse-datasource"
            - name: GF_SERVER_HTTP_PORT
              value: "3000"
            - name: GF_PATHS_PROVISIONING
              value: /etc/grafana/provisioning
            - name: GF_USERS_ALLOW_SIGN_UP
              value: "false"
          ports:
            - name: http
              containerPort: 3000
              protocol: TCP
          volumeMounts:
            - name: datasources
              mountPath: /etc/grafana/provisioning/datasources
              readOnly: true
            - name: dashboard-provider
              mountPath: /etc/grafana/provisioning/dashboards
              readOnly: true
            - name: dashboards
              mountPath: /var/lib/grafana/dashboards
              readOnly: true
          livenessProbe:
            httpGet:
              path: /api/health
              port: http
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /api/health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 5
          resources:
            {{- if .Values.grafana.temporary.resources }}
            {{- toYaml .Values.grafana.temporary.resources | nindent 12 }}
            {{- else }}
            requests: { cpu: 100m, memory: 256Mi }
            limits: { cpu: 500m, memory: 512Mi }
            {{- end }}
      volumes:
        - name: datasources
          configMap:
            name: {{ include "avika.fullname" . }}-grafana-temporary-datasources
        - name: dashboard-provider
          configMap:
            name: {{ include "avika.fullname" . }}-grafana-temporary-dashboard-provider
        - name: dashboards
          configMap:
            name: {{ include "avika.fullname" . }}-grafana-temporary-dashboards
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "avika.fullname" . }}-grafana-temporary
  labels:
    {{- include "avika.labels" . | nindent 4 }}
    app.kubernetes.io/component: grafana-temporary
spec:
  type: ClusterIP
  ports:
    - port: 3000
      targetPort: http
      protocol: TCP
      name: http
  selector:
    {{- include "avika.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: grafana-temporary
{{- end }}
