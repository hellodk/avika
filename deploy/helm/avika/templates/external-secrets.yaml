{{- if ne .Values.secretsProvider.provider "none" }}
# ExternalSecrets for {{ .Values.secretsProvider.provider | title }} integration
# Requires external-secrets operator: https://external-secrets.io/
---
apiVersion: external-secrets.io/v1beta1
kind: SecretStore
metadata:
  name: {{ include "avika.fullname" . }}-secrets-store
  labels:
    {{- include "avika.labels" . | nindent 4 }}
spec:
  provider:
    {{- if eq .Values.secretsProvider.provider "vault" }}
    vault:
      server: {{ .Values.secretsProvider.vault.address | quote }}
      path: "secret"
      version: "v2"
      {{- if .Values.secretsProvider.vault.token }}
      auth:
        tokenSecretRef:
          name: {{ include "avika.fullname" . }}-vault-secrets
          key: token
      {{- else }}
      auth:
        kubernetes:
          mountPath: "kubernetes"
          role: "avika"
          serviceAccountRef:
            name: {{ include "avika.serviceAccountName" . }}
      {{- end }}
    {{- else if eq .Values.secretsProvider.provider "cyberark" }}
    conjur:
      url: {{ .Values.secretsProvider.cyberark.applianceUrl | quote }}
      auth:
        jwt:
          account: {{ .Values.secretsProvider.cyberark.account | quote }}
          serviceAccountRef:
            name: {{ include "avika.serviceAccountName" . }}
    {{- end }}
---
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: {{ include "avika.fullname" . }}-db-external
  labels:
    {{- include "avika.labels" . | nindent 4 }}
spec:
  refreshInterval: "1h"
  secretStoreRef:
    name: {{ include "avika.fullname" . }}-secrets-store
    kind: SecretStore
  target:
    name: {{ include "avika.fullname" . }}-db-secrets
    creationPolicy: Owner
  data:
    {{- $prefix := "avika" }}
    {{- if eq .Values.secretsProvider.provider "vault" }}
    {{- $prefix = default "avika" .Values.secretsProvider.vault.secretsPath }}
    {{- else if eq .Values.secretsProvider.provider "cyberark" }}
    {{- $prefix = default "avika" .Values.secretsProvider.cyberark.secretsPath }}
    {{- end }}
    - secretKey: postgres-password
      remoteRef:
        key: {{ $prefix }}/postgresql
        property: password
    - secretKey: clickhouse-password
      remoteRef:
        key: {{ $prefix }}/clickhouse
        property: password
{{- end }}
