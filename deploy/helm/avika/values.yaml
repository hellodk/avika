# =============================================================================
# AVIKA HELM CHART - values.yaml
# =============================================================================
# This chart uses a generic component structure for easy extensibility.
# To add a new service, simply add a new block under 'components'.
#
# Port assignments: 5020-5050 range to avoid collisions
# =============================================================================

# -- Global Settings --
nameOverride: ""
fullnameOverride: ""
timezone: UTC

# Single source of truth for app image registry (must match .github/IMAGE_REGISTRY).
# Only gateway and frontend use this; other components use image.repository as-is.
global:
  imageRegistry: docker.io/hellodk

# Image pull secrets for private registries
imagePullSecrets: []

# Service Account
serviceAccount:
  create: true
  annotations: {}
  name: ""

# Pod settings (applied to all components)
podAnnotations: {}
podSecurityContext:
  runAsNonRoot: false
securityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: false
  capabilities:
    drop:
      - ALL

nodeSelector: {}
tolerations: []
affinity: {}

# =============================================================================
# SECRETS
# =============================================================================
# Credentials for databases. Auto-generated if empty.
# For production, set via: --set secrets.postgres.password=<secure>
secrets:
  postgres:
    password: ""  # Auto-generated if empty
  clickhouse:
    password: ""  # Auto-generated if empty

# =============================================================================
# AUTHENTICATION
# =============================================================================
auth:
  enabled: true
  username: "admin"
  # SHA-256 hash of password. Default: "admin"
  # Generate: echo -n "your-password" | sha256sum | cut -d' ' -f1
  passwordHash: "8c6976e5b5410415bde908bd4dee15dfb167a9c873fc4bb8a81f6f2ab448a918"
  jwtSecret: ""  # Auto-generated if empty
  tokenExpiry: "24h"
  cookieSecure: false
  cookieDomain: ""
  initialSecretPath: "/var/lib/avika/initial-admin-password"

# =============================================================================
# SSO / ENTERPRISE AUTHENTICATION (OIDC, LDAP, SAML)
# =============================================================================

# -- OpenID Connect (OIDC) --
oidc:
  enabled: false
  providerUrl: ""       # e.g., https://accounts.google.com
  clientId: ""
  clientSecret: ""
  redirectUrl: ""       # e.g., https://avika.example.com/api/auth/oidc/callback
  scopes: ["openid", "profile", "email", "groups"]
  groupsClaim: "groups"
  groupMapping: {}      # {"oidc-group": "avika-team"}
  defaultRole: "viewer"
  autoProvision: true

# -- LDAP / Active Directory --
ldap:
  enabled: false
  url: ""               # ldap:// or ldaps://
  bindDN: ""
  bindPassword: ""
  baseDN: ""
  userFilter: "(uid=%s)"
  groupFilter: "(memberUid=%s)"
  groupMapping: {}
  defaultRole: "viewer"
  autoProvision: true

# -- SAML 2.0 --
saml:
  enabled: false
  idpMetadataUrl: ""
  entityId: ""          # SP Entity ID
  rootUrl: ""           # SP Root URL
  certFile: "/etc/avika/saml/cert.pem"
  keyFile: "/etc/avika/saml/key.pem"
  groupsClaim: "groups"
  groupMapping: {}
  defaultRole: "viewer"
  autoProvision: true

# =============================================================================
# PSK (Pre-Shared Key) for Agent Authentication
# =============================================================================
psk:
  enabled: false
  existingSecret: ""
  existingSecretKey: "psk"
  key: ""  # Generate: openssl rand -hex 32
  allowAutoEnroll: true
  timestampWindow: "5m"
  requireHostMatch: false

# =============================================================================

# =============================================================================
# LLM (AI-Powered Error Analysis)
# =============================================================================
# Enables AI-powered error analysis and recommendations using LLM providers.
# Supports OpenAI, Anthropic (Claude), and Ollama (local).
llm:
  enabled: false
  provider: "openai"              # Options: openai, anthropic, ollama
  model: "gpt-4-turbo"            # Model name (e.g., gpt-4-turbo, claude-3-sonnet, llama3)
  baseUrl: ""                     # Custom base URL (for Ollama: http://ollama:11434)
  maxTokens: 4096
  temperature: 0.3
  timeoutSeconds: 60
  retryAttempts: 3
  rateLimitRpm: 60
  enableCaching: true
  cacheTtlMinutes: 30
  fallbackProvider: ""
  # API key can be provided via:
  # 1. existingSecret (recommended for production)
  # 2. apiKey value (for development only - not recommended)
  existingSecret: ""              # Name of existing secret containing API key
  existingSecretKey: "api-key"    # Key within the secret
  apiKey: ""                      # Direct API key (use existingSecret instead in production)

# =============================================================================
# SECRETS MANAGEMENT PROVIDER (Vault / CyberArk / Native)
# =============================================================================
# Select the secrets management provider.
# Options:
#   "vault"    - HashiCorp Vault via external-secrets
#   "cyberark" - CyberArk Conjur via external-secrets
#   "none"     - Use native Kubernetes secrets (avika-db-secrets, etc.)
#
# If "none" is selected, you can bring your own external secrets by
# ensuring Kubernetes secrets exist with the correct names/keys before installation.
secretsProvider:
  provider: "none"  # "vault", "cyberark", "none"
  
  # Configuration for HashiCorp Vault (if provider == "vault")
  vault:
    address: "http://vault.utilities.svc.cluster.local:8200"
    token: ""
    secretsPath: "avika"
    
  # Configuration for CyberArk (if provider == "cyberark")
  cyberark:
    applianceUrl: "https://conjur.utilities.svc.cluster.local"
    account: "default"
    authnSecretLabel: "conjur-authn-jwt"
    secretsPath: "avika"

# =============================================================================
# GATEWAY EXTERNAL URL (Cluster FQDN)
# =============================================================================
# When set, the frontend uses this URL to reach the gateway (HTTP API and WebSocket)
# instead of the internal service name. Use the cluster FQDN where the gateway is
# exposed (e.g. same host as ingress: https://avika.example.com).
# Supports both http:// and https://; WebSocket uses ws:// or wss:// accordingly.
gatewayExternalUrl: ""  # e.g. "https://avika.example.com" or "http://avika.example.com"

# =============================================================================
# COMPONENTS
# =============================================================================
# Each component follows a standard structure:
#   enabled: true/false
#   kind: Deployment (default) or StatefulSet
#   replicaCount: number of replicas
#   image: {repository, tag, pullPolicy}  # Use values here; avoid --set components.*.image.tag when deploying.
#   ports: {name: {containerPort, servicePort}}
#   env: environment variables
#   livenessProbe / readinessProbe: health checks
#   resources: CPU/memory limits
#   service: {type, annotations}
#   persistence: (StatefulSet only) {size, storageClass}
# =============================================================================

components:

  # ---------------------------------------------------------------------------
  # GATEWAY - Core API server
  # ---------------------------------------------------------------------------
  gateway:
    enabled: true
    replicaCount: 1
    image:
      useGlobalRegistry: true
      repository: avika-gateway
      tag: "latest"
      pullPolicy: Always
    terminationGracePeriodSeconds: 35
    
    ports:
      grpc:
        containerPort: 5020
      http:
        containerPort: 5021
      metrics:
        containerPort: 5022
    
    service:
      type: ClusterIP
    
    # Metrics are served on the main HTTP port (5021); use 5021 for Prometheus scrape
    podAnnotations:
      prometheus.io/scrape: "true"
      prometheus.io/port: "5021"
      prometheus.io/path: "/metrics"
    
    # Init containers are handled specially in deployment.yaml template
    
    # Environment variables (static values only - dynamic values handled in template)
    # LOG_LEVEL: debug|info|warn|error (default: info). LOG_FORMAT: json|console.
    env:
      GATEWAY_GRPC_PORT: "5020"
      GATEWAY_HTTP_PORT: "5021"
      GATEWAY_METRICS_PORT: "5022"
      AGENT_MGMT_PORT: "5025"
      ALLOWED_ORIGINS: "*"
      ENABLE_RATE_LIMIT: "true"
      RATE_LIMIT_RPS: "100"
      AUTH_ENABLED: "true"
      AUTH_USERNAME: "admin"
      CH_LOG_BUFFER_SIZE: "100000"
      CH_SPAN_BUFFER_SIZE: "200000"
      CH_LOG_BATCH_SIZE: "10000"
      CH_SPAN_BATCH_SIZE: "20000"
      CH_FLUSH_INTERVAL_MS: "100"
      # LOG_LEVEL: "info"
      # LOG_FORMAT: "json"
    
    livenessProbe:
      httpGet:
        path: /health
        port: http
      initialDelaySeconds: 15
      periodSeconds: 15
    
    readinessProbe:
      httpGet:
        path: /ready
        port: http
      initialDelaySeconds: 10
      periodSeconds: 10
    
    resources:
      limits:
        cpu: 500m
        memory: 512Mi
      requests:
        cpu: 100m
        memory: 128Mi
    
    autoscaling:
      enabled: false
      minReplicas: 1
      maxReplicas: 10
      targetCPUUtilizationPercentage: 70
      targetMemoryUtilizationPercentage: 80
    
    podDisruptionBudget:
      enabled: false
      minAvailable: 1

  # ---------------------------------------------------------------------------
  # FRONTEND - Next.js Web UI
  # ---------------------------------------------------------------------------
  frontend:
    enabled: true
    replicaCount: 1
    image:
      useGlobalRegistry: true
      repository: avika-frontend
      tag: "latest"
      pullPolicy: Always
    
    ports:
      http:
        containerPort: 5031
    
    service:
      type: ClusterIP
    
    # Prometheus scrape (path = basePath + /api/metrics)
    podAnnotations:
      prometheus.io/scrape: "true"
      prometheus.io/port: "5031"
      prometheus.io/path: "/avika/api/metrics"
    
    # Base path for subpath routing (e.g., /avika)
    basePath: "/avika"
    
    # Static env vars (dynamic ones like gateway URLs handled in template)
    env:
      PORT: "5031"
      NEXT_PUBLIC_BASE_PATH: "/avika"
      AUTH_ENABLED: "true"
    
    livenessProbe:
      httpGet:
        path: /avika/api/health
        port: http
      initialDelaySeconds: 15
      periodSeconds: 20
    
    readinessProbe:
      httpGet:
        path: /avika/api/health
        port: http
      initialDelaySeconds: 5
      periodSeconds: 10
    
    resources:
      limits:
        cpu: 500m
        memory: 512Mi
      requests:
        cpu: 100m
        memory: 256Mi

  # ---------------------------------------------------------------------------
  # OTEL-COLLECTOR - OpenTelemetry Collector
  # ---------------------------------------------------------------------------
  otel-collector:
    enabled: true
    replicaCount: 1
    image:
      repository: otel/opentelemetry-collector-contrib
      tag: "0.96.0"  # THIRD-PARTY: Do not auto-update
      pullPolicy: IfNotPresent
    
    ports:
      grpc:
        containerPort: 4317
      http:
        containerPort: 4318
    
    service:
      type: ClusterIP
    
    livenessProbe:
      httpGet:
        path: /
        port: 13133
      initialDelaySeconds: 10
      periodSeconds: 15
    
    readinessProbe:
      httpGet:
        path: /
        port: 13133
      initialDelaySeconds: 5
      periodSeconds: 10
    
    resources:
      limits:
        cpu: 500m
        memory: 512Mi
      requests:
        cpu: 100m
        memory: 128Mi

  # ---------------------------------------------------------------------------
  # POSTGRESQL - Primary Database (StatefulSet)
  # ---------------------------------------------------------------------------
  postgresql:
    enabled: true
    kind: StatefulSet
    replicaCount: 1
    image:
      repository: postgres
      tag: "16-alpine"  # THIRD-PARTY: Do not auto-update
      pullPolicy: IfNotPresent
    
    ports:
      tcp:
        containerPort: 5432
    
    # Env vars (password secret handled in template)
    env:
      POSTGRES_DB: "avika"
      POSTGRES_USER: "admin"
    
    livenessProbe:
      exec:
        command: ["pg_isready", "-U", "admin", "-d", "postgres"]
      initialDelaySeconds: 30
      periodSeconds: 10
    
    readinessProbe:
      exec:
        command: ["pg_isready", "-U", "admin", "-d", "postgres"]
      initialDelaySeconds: 5
      periodSeconds: 5
    
    volumeMounts:
      - name: data
        mountPath: /var/lib/postgresql/data
        subPath: pgdata
    
    persistence:
      size: 8Gi
      accessMode: ReadWriteOnce
    
    resources:
      limits:
        cpu: 500m
        memory: 512Mi
      requests:
        cpu: 100m
        memory: 256Mi

  # ---------------------------------------------------------------------------
  # CLICKHOUSE - Analytics Database (StatefulSet)
  # ---------------------------------------------------------------------------
  clickhouse:
    enabled: true
    kind: StatefulSet
    replicaCount: 1
    image:
      repository: clickhouse/clickhouse-server
      tag: "23.8-alpine"  # THIRD-PARTY: Do not auto-update
      pullPolicy: IfNotPresent
    
    ports:
      http:
        containerPort: 8123
      native:
        containerPort: 9000
    
    # Env vars (password secret handled in template)
    env:
      CLICKHOUSE_DB: "avika"
      CLICKHOUSE_USER: "default"
    
    livenessProbe:
      httpGet:
        path: /ping
        port: http
      initialDelaySeconds: 30
      periodSeconds: 10
    
    readinessProbe:
      httpGet:
        path: /ping
        port: http
      initialDelaySeconds: 5
      periodSeconds: 5
    
    volumeMounts:
      - name: data
        mountPath: /var/lib/clickhouse
    
    persistence:
      size: 10Gi
      accessMode: ReadWriteOnce
    
    resources:
      limits:
        cpu: 2
        memory: 4Gi
      requests:
        cpu: 500m
        memory: 2Gi

  # ---------------------------------------------------------------------------
  # REDPANDA - Message Queue (StatefulSet)
  # ---------------------------------------------------------------------------
  redpanda:
    enabled: false  # Disabled: io_uring not supported on NFS storage
    kind: StatefulSet
    replicaCount: 1
    image:
      repository: redpandadata/redpanda
      tag: "v24.1.1"  # THIRD-PARTY: Do not auto-update with app version
      pullPolicy: IfNotPresent
    
    # Redpanda needs special args for NFS storage (io_uring not supported)
    command:
      - rpk
      - redpanda
      - start
    args:
      - --smp=1
      - --memory=1G
      - --reserve-memory=0M
      - --overprovisioned
      - --unsafe-bypass-fsync=1
      - --default-log-level=warn
      - --kafka-addr=0.0.0.0:9092
      - --advertise-kafka-addr=avika-redpanda:9092
    
    ports:
      kafka:
        containerPort: 9092
      admin:
        containerPort: 9644
    
    env:
      REDPANDA_SEED_SERVERS: ""
    
    livenessProbe:
      tcpSocket:
        port: kafka
      initialDelaySeconds: 30
      periodSeconds: 10
    
    readinessProbe:
      tcpSocket:
        port: kafka
      initialDelaySeconds: 5
      periodSeconds: 5
    
    volumeMounts:
      - name: data
        mountPath: /var/lib/redpanda/data
    
    persistence:
      size: 10Gi
      accessMode: ReadWriteOnce
    
    resources:
      limits:
        cpu: 1
        memory: 2Gi
      requests:
        cpu: 200m
        memory: 512Mi

# =============================================================================
# INGRESS (Optional)
# =============================================================================
ingress:
  enabled: false
  className: ""
  annotations: {}
  hosts:
    - host: avika.local
      paths:
        - path: /
          pathType: Prefix
          service: frontend
        - path: /api
          pathType: Prefix
          service: gateway
  tls: []

# =============================================================================
# MONITORING
# =============================================================================
monitoring:
  prometheus:
    enabled: true
    scrape: true
    interval: 30s
    path: /metrics

  # Optional ServiceMonitor resources for Prometheus Operator (e.g. kube-prometheus-stack).
  # When enabled, creates ServiceMonitors for gateway and frontend so Prometheus discovers
  # Avika metrics without relying on pod annotations. Disabled by default.
  serviceMonitor:
    enabled: false
    # namespace: ""  # If set, ServiceMonitors are created in this namespace; default: release namespace

# =============================================================================
# GRAFANA INTEGRATION (kube-prometheus-stack)
# =============================================================================
# Creates ConfigMaps with appropriate labels for Grafana sidecar discovery.
# The kube-prometheus-stack Grafana sidecar scans all namespaces for ConfigMaps
# with grafana_dashboard: "1" and grafana_datasource: "1" labels.
grafana:
  # URL for Grafana (used for embedded dashboards in frontend)
  # Should be browser-accessible URL to Grafana
  url: ""  # e.g., http://grafana.monitoring.svc.cluster.local:3000 or external URL

  # Temporary Grafana in avika namespace for testing dashboards and ClickHouse.
  # helm upgrade ... --set grafana.temporary.enabled=true [--set grafana.temporary.adminPass=yourpass]
  # Then: kubectl port-forward -n avika svc/<release>-grafana-temporary 3000:3000
  # Open http://localhost:3000 (admin / value of adminPass).
  temporary:
    enabled: false
    # Set when enabling (e.g. --set grafana.temporary.adminPass=yourpass). Do not commit real secrets.
    adminPass: "REPLACE_ME"
    image:
      repository: grafana/grafana
      tag: "11.5.0"
      pullPolicy: IfNotPresent
    resources:
      requests:
        cpu: 100m
        memory: 256Mi
      limits:
        cpu: 500m
        memory: 512Mi
  
  dashboards:
    enabled: true
    folder: "Avika"
  
  datasources:
    enabled: true
    clickhouse:
      name: "ClickHouse"
      uid: "DS_CLICKHOUSE"
      # Set to true only if this is the sole datasource (avoids "Only one datasource can be default" when using sidecar or shared Grafana).
      isDefault: false
      # Host: leave empty to use in-cluster FQDN. Override if Grafana runs in another namespace or needs a different address.
      host: ""  # e.g. "avika-clickhouse-0.avika-clickhouse.avika.svc.cluster.local" for direct pod DNS
      port: 8123
      database: "nginx_analytics"
      username: "default"
      # ClickHouse password for Grafana. If empty, the chart looks up the existing Secret
      # <release>-db-secrets (key clickhouse-password) at template time and uses it, so
      # "helm upgrade -f values.yaml --install" works without --set. Override here to use a different value.
      password: ""
      dialTimeout: 10  # Connection timeout in seconds; increase if Grafana cannot reach ClickHouse in time
      queryTimeout: 60  # Query timeout in seconds (plugin default 60)
