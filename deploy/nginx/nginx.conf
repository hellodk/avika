user  nginx;
worker_processes  auto;

error_log  /var/log/nginx/error.log notice;
pid        /var/run/nginx.pid;

events {
    worker_connections  10000;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    log_format  main  '$remote_addr - $remote_user [$time_local] "$request" '
                      '$status $body_bytes_sent "$http_referer" '
                      '"$http_user_agent" "$http_x_forwarded_for"';

    access_log  /var/log/nginx/access.log  main;

    sendfile        on;
    keepalive_timeout  65;

    # Map for WebSocket connection upgrades
    map $http_upgrade $connection_upgrade {
        default upgrade;
        ''      close;
    }

    # Internal K8s DNS Resolver
    resolver 10.96.0.10 valid=10s;

    # =========================================================
    # Upstreams
    # =========================================================
    
    # API / Webhooks / WebSockets (Port 5021)
    upstream gateway_http {
        # Using Kubernetes internal DNS name
        server avika-gateway.avika.svc.cluster.local:5021 resolve;
    }

    # gRPC Agents (Port 5020)
    upstream gateway_grpc {
        # Using Kubernetes internal DNS name
        server avika-gateway.avika.svc.cluster.local:5020 resolve;
    }

    # =========================================================
    # Server: API and WebSockets (Terminal) [Port 5021]
    # =========================================================
    server {
        listen 80;
        listen 443 ssl;
        server_name _; # Adjust to your domain

        # SSL Configuration
        ssl_certificate     /etc/nginx/certs/avika.pem;
        ssl_certificate_key /etc/nginx/certs/avika.key;

        # Standard HTTP Routing
        location / {
            proxy_pass http://gateway_http;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_addrs;
        }

        # WebSocket Terminal Upgrades
        location /terminal {
            proxy_pass http://gateway_http;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
            proxy_set_header Host $host;
            # Extended timeouts for terminal sessions
            proxy_read_timeout 3600s;
            proxy_send_timeout 3600s;
        }
    }

    # =========================================================
    # Server: gRPC (Agent Communication) [Port 5020]
    # =========================================================
    server {
        # Note the http2 directive. Essential for gRPC.
        listen 8443 ssl http2;
        server_name _;

        # SSL Configuration
        ssl_certificate     /etc/nginx/certs/avika.pem;
        ssl_certificate_key /etc/nginx/certs/avika.key;

        location / {
            # Route gRPC payload
            # Replace grpc:// with grpcs:// if the upstream gateway enforces mTLS directly. 
            grpc_pass grpc://gateway_grpc;
            
            grpc_set_header X-Forwarded-For $proxy_addrs;
            
            # gRPC typically needs extended timeouts
            grpc_read_timeout 1h;
            grpc_send_timeout 1h;
        }
    }
}
