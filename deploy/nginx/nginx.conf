user  nginx;
worker_processes  auto;

error_log  /var/log/nginx/error.log notice;
pid        /var/run/nginx.pid;

events {
    worker_connections  10000;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    log_format avika_json escape=json
    '{'
      '"ts":"$time_iso8601",'
      '"req_id":"$request_id",'
      '"client":"$remote_addr",'
      '"xff":"$http_x_forwarded_for",'
      '"method":"$request_method",'
      '"path":"$uri",'
      '"status":$status,'
      '"bytes":$body_bytes_sent,'
      '"rt":$request_time,'
      '"uct":"$upstream_connect_time",'
      '"uht":"$upstream_header_time",'
      '"urt":"$upstream_response_time",'
      '"upstream":"$upstream_addr",'
      '"ustatus":"$upstream_status",'
      '"referer":"$http_referer",'
      '"ua":"$http_user_agent"'
    '}';

    access_log  /var/log/nginx/access.log avika_json;

    sendfile        on;
    keepalive_timeout  65;

    # Map for WebSocket connection upgrades
    map $http_upgrade $connection_upgrade {
        default upgrade;
        ''      close;
    }

    # Internal K8s DNS Resolver
    resolver 10.96.0.10 valid=10s;

    # =========================================================
    # Upstreams
    # =========================================================

    # Next.js Frontend (Port 443 maps to container 5031)
    upstream frontend_http {
        server avika-frontend.avika.svc.cluster.local:443 resolve;
    }

    # Gateway API / Webhooks / WebSockets (Port 443 maps to container 5021)
    upstream gateway_http {
        server avika-gateway.avika.svc.cluster.local:443 resolve;
    }

    # Gateway gRPC — Agents (Port 8443 maps to container 5020)
    upstream gateway_grpc {
        server avika-gateway.avika.svc.cluster.local:8443 resolve;
    }

    # =========================================================
    # Server: HTTPS (Port 443) — UI + API + Updates
    # =========================================================
    server {
        listen 443 ssl;
        http2 on;
        server_name _; # Adjust to your domain

        ssl_certificate     /etc/nginx/certs/avika.pem;
        ssl_certificate_key /etc/nginx/certs/avika.key;

        # ── /avika/updates/install → frontend (dynamic install script) ──
        # Exact match takes precedence over the prefix /avika/updates/ block.
        location = /avika/updates/install {
            proxy_pass http://frontend_http;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # ── /avika → Next.js frontend ───────────────────────────
        location /avika {
            proxy_pass http://frontend_http;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
        }

        # ── /avika/api/* → gateway (strip /avika prefix) ───────
        location /avika/api/ {
            rewrite ^/avika/api/(.*) /api/$1 break;
            proxy_pass http://gateway_http;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # ── /avika/updates/* → gateway (strip /avika prefix) ───
        # Serves deploy-agent.sh, agent binary, checksums, version.json, systemd unit.
        location /avika/updates/ {
            rewrite ^/avika/updates/(.*) /updates/$1 break;
            proxy_pass http://gateway_http;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_buffering off;
        }

        # ── /avika/terminal → gateway WebSocket ────────────────
        location /avika/terminal {
            rewrite ^/avika/terminal /terminal break;
            proxy_pass http://gateway_http;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
            proxy_set_header Host $host;
            proxy_read_timeout 3600s;
            proxy_send_timeout 3600s;
        }

        # ── gRPC (agent communication) ─────────────────────────
        location ~ ^/(nginx\.agent\.v1|grpc\.health\.v1)\. {
            grpc_pass grpc://gateway_grpc;
            grpc_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            grpc_read_timeout 1h;
            grpc_send_timeout 1h;
        }

        # ── Default: redirect root to /avika ────────────────────
        location / {
            return 302 /avika;
        }
    }
}
