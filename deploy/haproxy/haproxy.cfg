# Avika HAProxy config for ncnhap.com (compatible with 2.8+)
global
    log stdout format raw local0 info
    maxconn 50000
    daemon

defaults
    log     global
    mode    http
    option  httplog
    option  dontlognull
    timeout connect 5s
    timeout client  50s
    timeout server  50s
    timeout tunnel  1h  # Required for long-lived WebSockets

# =========================================================
# Frontend: HTTPS/HTTP [Port 80/443]
# =========================================================
frontend avika_https
    bind *:8080
    bind *:8443 ssl crt /etc/haproxy/certs/avika.pem alpn h2,http/1.1
    mode http

    # Standard HTTP logging
    option httplog
    # log-format "{\"ts\":\"%T\",\"req_id\":\"%ID\",\"client\":\"%ci\",\"xff\":\"%[hdr(x-forwarded-for)]\",\"method\":\"%HM\",\"path\":\"%HU\",\"status\":%ST,\"bytes\":%B,\"rt\":%Tr,\"uct\":\"%Tc\",\"uht\":\"%Th\",\"urt\":\"%Tw\",\"upstream\":\"%si\",\"ustatus\":\"%s\",\"referer\":\"%[hdr(referer)]\",\"ua\":\"%[hdr(user-agent)]\"}"

    # Routing for Avika (https://ncnhap.com/avika)
    acl is_root path /
    http-request redirect location /avika if is_root

    # Routing ACLs
    acl is_avika_api path_beg /avika/api/
    acl is_avika_updates path_beg /avika/updates/
    acl is_avika_terminal path_beg /avika/terminal
    acl is_avika path_beg /avika
    
    # gRPC ACLs (Agent communication)
    acl is_grpc path_beg /nginx.agent.v1. /grpc.health.v1.

    # Mark backends before path rewrites
    http-request set-var(txn.route) str(api) if is_avika_api
    http-request set-var(txn.route) str(updates) if is_avika_updates
    http-request set-var(txn.route) str(terminal) if is_avika_terminal
    http-request set-var(txn.route) str(grpc) if is_grpc
    http-request set-var(txn.route) str(ui) if is_avika !is_avika_api !is_avika_updates !is_avika_terminal

    # Rewrites for API and Terminal (match gateway expectations)
    http-request set-path %[path,regsub(^/avika/api/,/api/)] if is_avika_api
    http-request set-path %[path,regsub(^/avika/updates/,/updates/)] if is_avika_updates
    http-request set-path %[path,regsub(^/avika/terminal,/terminal)] if is_avika_terminal

    # Backend selection based on marked route
    use_backend avika_grpc_backend if { var(txn.route) -m str grpc }
    # Route API and Updates through Frontend (Next.js server-side routes)
    use_backend avika_frontend_backend if { var(txn.route) -m str api } || { var(txn.route) -m str updates }
    # Terminal (WebSocket) goes directly to Gateway
    use_backend avika_gateway_backend if { var(txn.route) -m str terminal }
    use_backend avika_frontend_backend if { var(txn.route) -m str ui }

    default_backend avika_frontend_backend

# =========================================================
# Backends
# =========================================================

# Frontend Next.js Backend
backend avika_frontend_backend
    mode http
    balance roundrobin
    server frontend avika-frontend.avika.svc.cluster.local:443 check resolvers k8s

backend avika_gateway_backend
    mode http
    balance roundrobin
    server gateway avika-gateway.avika.svc.cluster.local:443 check resolvers k8s

# gRPC Backend (Agent to Gateway)
backend avika_grpc_backend
    mode http
    balance leastconn
    server gateway avika-gateway.avika.svc.cluster.local:8443 proto h2 check resolvers k8s

# =========================================================
# Resolvers (For Kubernetes Dynamic IP Discovery)
# =========================================================
resolvers k8s
    nameserver coredns 10.96.0.10:53
    resolve_retries 3
    timeout retry   1s
    hold valid      10s
