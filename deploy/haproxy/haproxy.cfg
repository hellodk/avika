global
    log stdout format raw local0 info
    maxconn 50000
    daemon

defaults
    log     global
    mode    http
    option  httplog
    
    # Custom Avika JSON Log Format
    log-format "{\"ts\":\"%T\",\"req_id\":\"%ID\",\"client\":\"%ci\",\"xff\":\"%[req.fhdr(x-forwarded-for)]\",\"method\":\"%HM\",\"path\":\"%HU\",\"status\":%ST,\"bytes\":%B,\"rt\":%Tr,\"uct\":\"%Tc\",\"uht\":\"%Th\",\"urt\":\"%Tw\",\"upstream\":\"%si\",\"ustatus\":\"%s\",\"referer\":\"%[req.fhdr(referer)]\",\"ua\":\"%[req.fhdr(user-agent)]\"}"

    option  dontlognull
    timeout connect 5s
    timeout client  50s
    timeout server  50s
    timeout tunnel  1h  # Required for long-lived WebSockets

# =========================================================
# Frontend: API and WebSockets (Terminal) [Port 5021]
# =========================================================
frontend avika_http_ws
    bind *:80
    bind *:443 ssl crt /etc/haproxy/certs/avika.pem  # Adjust path to your SSL certificate
    mode http

    # Enable WebSocket upgrades
    acl is_websocket hdr(Upgrade) -i WebSocket
    use_backend avika_ws_backend if is_websocket

    default_backend avika_http_backend

# =========================================================
# Frontend: gRPC (Agent Communication) [Port 5020]
# =========================================================
frontend avika_grpc
    # gRPC requires HTTP/2. We bind with ALPN h2.
    bind *:8443 ssl crt /etc/haproxy/certs/avika.pem alpn h2
    mode http

    # Required for gRPC HTTP/2 routing
    default_backend avika_grpc_backend

# =========================================================
# Backends
# =========================================================

# HTTP API Backend
backend avika_http_backend
    mode http
    balance roundrobin
    option httpchk GET /health
    # Uses K8s internal DNS (adjust 'avika' namespace if different)
    server gateway1 avika-gateway.avika.svc.cluster.local:5021 check resolvers k8s

# WebSocket Terminal Backend
backend avika_ws_backend
    mode http
    balance source  # Sticky sessions for terminal instances
    option httpchk GET /health
    server gateway1 avika-gateway.avika.svc.cluster.local:5021 check resolvers k8s

# gRPC Backend (Agent to Gateway mTLS)
backend avika_grpc_backend
    mode http
    balance leastconn
    # ALPN h2 forced on backend to preserve HTTP/2 frames for gRPC
    # Note: If the Gateway pod expects mTLS, you may need to configure server-side TLS here
    # e.g., `server gateway1 avika-gateway.avika.svc.cluster.local:5020 ssl verify required ca-file /etc/haproxy/certs/ca.crt alpn h2 check`
    # Defaulting to cleartext h2 if terminating TLS at HAProxy layer:
    server gateway1 avika-gateway.avika.svc.cluster.local:5020 proto h2 check resolvers k8s

# =========================================================
# Resolvers (For Kubernetes Dynamic IP Discovery)
# =========================================================
resolvers k8s
    nameserver coredns 10.96.0.10:53
    resolve_retries 3
    timeout retry   1s
    hold valid      10s
